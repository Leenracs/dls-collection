<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>

    <style>
        :root {
            --gold: #ffd700;
            --bg: #08080c;
            --panel: #141419;
            --panel-2: #101014;
            --text: #ffffff;
            --muted: #9ca3af;
            --border: rgba(255,255,255,0.1);
        }

        *{*
            box-sizing: border-box;
        }

        html {
            background: var(--bg);
        }

        body {
            background:
                radial-gradient(circle at 20% 0%, rgba(255, 215, 0, 0.12), transparent 28%),
                radial-gradient(circle at 80% 5%, rgba(80, 120, 255, 0.15), transparent 30%),
                radial-gradient(circle at 50% 100%, rgba(170, 60, 255, 0.08), transparent 35%),
                linear-gradient(180deg, #101018 0%, #08080c 60%, #070709 100%);
            background-color: var(--bg);
            min-height: 100vh;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 32px 18px 50px;
            overflow-x: hidden;
        }

        /* === HERO === */
        .hero {
            max-width: 1200px;
            margin: 0 auto 18px auto;
            padding: 34px 20px;
            text-align: center;
            border-radius: 24px;
            background:
                linear-gradient(135deg, rgba(255, 215, 0, 0.13), transparent 35%),
                linear-gradient(225deg, rgba(80, 120, 255, 0.15), transparent 42%),
                rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.11);
            box-shadow: 0 18px 55px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            top: -190px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .hero-kicker {
            position: relative;
            z-index: 1;
            color: var(--gold);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.2px;
            margin-bottom: 10px;
        }

        h1 {
            position: relative;
            z-index: 1;
            text-align: center;
            margin: 0;
            font-size: clamp(34px, 6vw, 62px);
            line-height: 0.98;
            font-weight: 950;
            letter-spacing: -1.8px;
            color: #ffffff;
            text-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .hero p {
            position: relative;
            z-index: 1;
            max-width: 620px;
            margin: 14px auto 0;
            color: #aeb5c0;
            font-size: 15px;
            line-height: 1.55;
        }

        /* === CONTROLS === */
        .controls {
            max-width: 1200px;
            margin: 0 auto 15px auto;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 35px rgba(0,0,0,0.28);
        }

        select,
        input[type="text"] {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.13);
            padding: 11px 16px;
            border-radius: 11px;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }

        select {
            cursor: pointer;
        }

        input[type="text"] {
            width: min(330px, 100%);
        }

        input[type="text"]::placeholder {
            color: #858b96;
        }

        select:hover,
        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.34);
            background: rgba(255, 255, 255, 0.095);
        }

        select option {
            background: #18181d;
            color: #fff;
        }

        /* === LIVE STATS COUNTER === */
        .stats-counter {
            text-align: center;
            font-size: 13px;
            color: #a0a5ab;
            margin-bottom: 28px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .stats-counter span {
            color: var(--gold);
            font-weight: 950;
        }

        /* === GALLERY === */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(245px, 280px));
            justify-content: center;
            gap: 22px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === CARD CONTAINER === */
        .card-container {
            position: relative;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.065), rgba(255,255,255,0.022)),
                linear-gradient(145deg, #18181d, #101014);
            border: 1px solid rgba(255, 255, 255, 0.075);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
            animation: cardIn 0.35s ease both;
        }

        .card-container::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 45%);
        }

        .card-container:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.17);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.62);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Rarity glow */
        .card-container.rarity-special {
            border-color: rgba(240, 206, 84, 0.25);
            box-shadow: 0 14px 34px rgba(240, 206, 84, 0.08), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-container.rarity-champion {
            border-color: rgba(90, 135, 255, 0.32);
            box-shadow: 0 14px 34px rgba(70, 120, 255, 0.11), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-container.rarity-dream {
            border-color: rgba(224, 132, 255, 0.32);
            box-shadow: 0 14px 34px rgba(190, 80, 255, 0.12), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-container.rarity-toty {
            border-color: rgba(69, 240, 155, 0.3);
            box-shadow: 0 14px 34px rgba(69, 240, 155, 0.1), 0 14px 34px rgba(0,0,0,0.45);
        }

        /* === CARD IMAGE === */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 14px;
            margin-bottom: 13px;
            padding: 10px;
            transform-style: preserve-3d;
            will-change: transform;
            cursor: zoom-in;
            z-index: 1;
            background:
                radial-gradient(circle at 50% 12%, rgba(255,255,255,0.15), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.07);
        }

        .holo-glare {
            position: absolute;
            inset: 10px;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 5;
            mix-blend-mode: screen;
        }

        .card-image {
            width: 100%;
            border-radius: 10px;
            display: block;
            pointer-events: none;
            position: relative;
            z-index: 1;
            background: #111;
            box-shadow: 0 9px 20px rgba(0,0,0,0.42);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-top: 2px;
            margin-bottom: 12px;
            padding: 0 4px;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 15px;
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: 0.35px;
            color: #ffffff;
            margin: 0;
            word-break: break-word;
        }

        .card-rating {
            white-space: nowrap;
            flex-shrink: 0;
            background: rgba(255, 215, 0, 0.13);
            color: var(--gold);
            border: 1px solid rgba(255, 215, 0, 0.36);
            font-weight: 950;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            letter-spacing: 0.4px;
        }

        /* === TAGS === */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 4px 2px;
            position: relative;
            z-index: 1;
        }

        .tag {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10.5px;
            font-weight: 850;
            letter-spacing: 0.55px;
            text-transform: uppercase;
        }

        .tag-FW { background: rgba(209, 40, 40, 0.2); color: #ff5e5e; border: 1px solid rgba(209, 40, 40, 0.45); }
        .tag-MF { background: rgba(252, 232, 35, 0.18); color: #ffea3b; border: 1px solid rgba(252, 232, 35, 0.45); }
        .tag-DF { background: rgba(45, 219, 75, 0.18); color: #4ee86e; border: 1px solid rgba(45, 219, 75, 0.45); }
        .tag-GK { background: rgba(42, 111, 214, 0.2); color: #619dff; border: 1px solid rgba(42, 111, 214, 0.45); }

        .tag-Legendary { background: rgba(255, 255, 255, 0.06); color: #b6bdc8; border: 1px solid rgba(255, 255, 255, 0.16); }
        .tag-Special { background: rgba(212, 175, 55, 0.15); color: #f0ce54; border: 1px solid rgba(212, 175, 55, 0.4); }

        [class*="tag-Champion"] { background: rgba(13, 58, 153, 0.25); color: #78a2ff; border: 1px solid rgba(13, 58, 153, 0.5); }*
        [class*="tag-Classic"] { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.25); }*
        [class*="tag-Dream-Star"] { background: rgba(147, 34, 201, 0.22); color: #e084ff; border: 1px solid rgba(147, 34, 201, 0.5); }*
        [class*="tag-Kick-Off"] { background: rgba(201, 22, 82, 0.22); color: #ff75a4; border: 1px solid rgba(201, 22, 82, 0.5); }*
        [class*="tag-Toty"] { background: rgba(0, 143, 68, 0.22); color: #45f09b; border: 1px solid rgba(0, 143, 68, 0.5); }*

        /*=== MODAL ===*/
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.86);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            max-width: 410px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.88) translateY(8px);
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: #111;
        }

        .modal-caption {
            margin-top: 15px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 16px;
            font-weight: 950;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.4px;
        }

        .modal-close {
            position: absolute;
            top: -48px;
            right: 0;
            color: #ffffff;
            font-size: 34px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            user-select: none;
        }

        .modal-close:hover {
            color: var(--gold);
            transform: scale(1.08);
        }

        @media (max-width: 760px) {
            body {
                padding: 22px 13px 40px;
            }

            .controls {
                justify-content: stretch;
            }

            select,
            input[type="text"] {
                width: 100%;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                gap: 16px;
            }

            .hero {
                padding: 30px 16px;
            }

            h1 {
                letter-spacing: -1.2px;
            }
        }
    </style>
</head>

<body>

    <header class="hero">
        <div class="hero-kicker">Dream League Soccer</div>
        <h1>My DLS Card Collection</h1>
        <p>Browse, filter and showcase your custom DLS cards with ratings, rarity badges and full-screen previews.</p>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 Search player...">

        <select id="sortSelect">
            <option value="ratingDesc">Sort by Rating (High to Low)</option>
            <option value="ratingAsc">Sort by Rating (Low to High)</option>
            <option value="nameAsc">Sort by Name (A-Z)</option>
        </select>

        <select id="filterSelect">
            <option value="All">All Cards</option>
            <option value="Legendary">Legendary</option>
            <option value="Special">Special</option>
            <option value="FW">Forwards (FW)</option>
            <option value="MF">Midfielders (MF)</option>
            <option value="DF">Defenders (DF)</option>
            <option value="GK">Goalkeepers (GK)</option>
            <option value="Champion">Champion</option>
            <option value="Classic">Classic</option>
            <option value="Dream Star">Dream Star</option>
            <option value="Kick-Off Star">Kick-Off Star</option>
            <option value="Toty 2025">TOTY 2025</option>
        </select>
    </div>

    <div class="stats-counter" id="statsCounter">Loading stats...</div>

    <div class="gallery" id="gallery"></div>

    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close">×</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv";

        let myCards = [];

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const filterSelect = document.getElementById('filterSelect');
        const statsCounter = document.getElementById('statsCounter');

        const cardModal = document.getElementById('cardModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');

        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();

                const rows = csvText.split(/\r?\n/).slice(1);

                myCards = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(',');

                    const name = cols[0] ? cols[0].trim() : "Unknown";
                    const rating = cols[1] ? parseInt(cols[1].trim()) : 0;

                    const tags = [cols[2], cols[3], cols[4]]
                        .map(tag => tag ? tag.trim() : '')
                        .filter(tag => tag !== '');

                    const image = cols[5] ? cols[5].trim() : '';

                    return { name, rating, tags, image };
                });

                updateGallery();

            } catch (error) {
                console.error("Error loading data:", error);
                gallery.innerHTML = "<p style='color:white; text-align:center;'>Failed to load players.</p>";
                statsCounter.innerHTML = "Failed to load cards.";
            }
        }

        function renderCards(cardsArray) {
            gallery.innerHTML = '';

            if (cardsArray.length === 0) {
                gallery.innerHTML = "<p style='color:#888; text-align:center; width:100%; grid-column: 1/-1;'>No players found matching your search.</p>";
                return;
            }

            cardsArray.forEach((card, index) => {
                let tagsHTML = '';

                card.tags.forEach(tag => {
                    const tagClass = tag.replace(/\s+/g, '-');
                    tagsHTML += `<span class="tag tag-${tagClass}">${tag}</span>`;
                });

                const cardElement = document.createElement('div');
                cardElement.className = 'card-container';
                cardElement.style.animationDelay = `${Math.min(index *30, 300)}ms`;*

                const joinedTags = card.tags.join(' ').toLowerCase();

                if (joinedTags.includes('special')) {
                    cardElement.classList.add('rarity-special');
                }

                if (joinedTags.includes('champion')) {
                    cardElement.classList.add('rarity-champion');
                }

                if (joinedTags.includes('dream')) {
                    cardElement.classList.add('rarity-dream');
                }

                if (joinedTags.includes('toty')) {
                    cardElement.classList.add('rarity-toty');
                }

                cardElement.innerHTML = `
                    <div class="card-image-wrapper">
                        <div class="holo-glare"></div>
                        <img src="images/${card.image}.webp" alt="${card.name}" class="card-image" decoding="async" onerror="this.src='https://via.placeholder.com/300x420/191919/ffffff?text=Image+Missing'">
                    </div>
                    <div class="card-header">
                        <div class="card-title">${card.name}</div>
                        <div class="card-rating">★ ${card.rating}</div>
                    </div>
                    <div class="tags">${tagsHTML}</div>
                `;

                const imageWrapper = cardElement.querySelector('.card-image-wrapper');
                const holoGlare = imageWrapper.querySelector('.holo-glare');

                imageWrapper.addEventListener('click', () => {
                    modalImage.src = `images/${card.image}.webp`;
                    modalCaption.innerHTML = `${card.name} <span style="color:#ffd700; margin-left:8px;">★ ${card.rating}</span>`;
                    cardModal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });

                if (isDesktop) {
                    imageWrapper.addEventListener('mouseenter', () => {
                        imageWrapper.style.transition = 'transform 0.08s ease-out';
                        imageWrapper.style.zIndex = '10';

                        if (holoGlare) {
                            holoGlare.style.opacity = '1';
                        }
                    });

                    imageWrapper.addEventListener('mousemove', (e) => {
                        const rect = imageWrapper.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;

                        const rotateX = ((y - rect.height / 2) / (rect.height / 2))* -14;*
                        const rotateY = ((x - rect.width / 2) / (rect.width / 2)) *14;*

                        imageWrapper.style.transform = `perspective(850px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(1.075) translateY(-4px)`;
                        imageWrapper.style.boxShadow = '0 25px 50px rgba(0, 0, 0, 0.82)';

                        if (holoGlare) {
                            const percentX = (x / rect.width)* 100;*
                            const percentY = (y / rect.height) * 100;*

                            holoGlare.style.background = `radial-gradient(circle at ${percentX}% ${percentY}%, rgba(255, 255, 255, 0.42) 0%, rgba(255, 215, 0, 0.2) 24%, rgba(255, 105, 180, 0.14) 43%, rgba(0, 212, 255, 0.1) 62%, transparent 80%)`;
                        }
                    });

                    imageWrapper.addEventListener('mouseleave', () => {
                        imageWrapper.style.transition = 'all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1)';
                        imageWrapper.style.transform = 'perspective(850px) rotateX(0deg) rotateY(0deg) scale(1) translateY(0px)';
                        imageWrapper.style.boxShadow = 'none';
                        imageWrapper.style.zIndex = '1';

                        if (holoGlare) {
                            holoGlare.style.opacity = '0';
                        }
                    });
                }

                gallery.appendChild(cardElement);
            });
        }

        cardModal.addEventListener('click', (e) => {
            if (e.target === cardModal || e.target.classList.contains('modal-close')) {
                cardModal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cardModal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        function updateGallery() {
            let filteredCards = [...myCards];

            const searchQuery = searchInput.value.toLowerCase().trim();

            if (searchQuery !== "") {
                filteredCards = filteredCards.filter(card =>
                    card.name.toLowerCase().includes(searchQuery) ||
                    card.tags.some(tag => tag.toLowerCase().includes(searchQuery))
                );
            }

            const filterValue = filterSelect.value;

            if (filterValue !== "All") {
                filteredCards = filteredCards.filter(card => card.tags.includes(filterValue));
            }

            const sortValue = sortSelect.value;

            if (sortValue === "ratingDesc") {
                filteredCards.sort((a, b) => b.rating - a.rating);
            } else if (sortValue === "ratingAsc") {
                filteredCards.sort((a, b) => a.rating - b.rating);
            } else if (sortValue === "nameAsc") {
                filteredCards.sort((a, b) => a.name.localeCompare(b.name));
            }

            const count = filteredCards.length;

            if (count > 0) {
                const totalRating = filteredCards.reduce((sum, card) => sum + card.rating, 0);
                const avg = (totalRating / count).toFixed(1);

                statsCounter.innerHTML = `Showing <span>${count}</span> Card${count !== 1 ? 's' : ''} | Avg Rating: <span>★ ${avg}</span>`;
            } else {
                statsCounter.innerHTML = `Showing <span>0</span> Cards`;
            }

            renderCards(filteredCards);
        }

        searchInput.addEventListener('input', updateGallery);
        sortSelect.addEventListener('change', updateGallery);
        filterSelect.addEventListener('change', updateGallery);

        loadData();
    </script>
</body>
</html>
