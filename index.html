<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>
    
    <!-- Premium Esports & UI Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* === ATMOSPHERIC BASE STYLING === */
        body { 
            /* Animated Ambient Glow Background */
            background-color: #0a0a0c;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(20, 40, 90, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(90, 20, 60, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #e0e0e0; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        /* === HERO BANNER === */
        .hero-banner {
            background: linear-gradient(to bottom, rgba(10, 10, 12, 0.2), #0a0a0c), 
                        url('https://images.unsplash.com/photo-1518605368461-1e1e38ce81e6?q=80&w=2000&auto=format&fit=crop') center/cover;
            padding: 70px 20px 40px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hero-banner h1 { 
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            font-size: 3.2rem;
            margin: 0; 
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff; 
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
        }
        .hero-banner .subtitle {
            font-family: 'Rajdhani', sans-serif;
            color: #ffd700;
            letter-spacing: 4px;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* === MAIN CONTENT WRAPPER === */
        .content-wrapper {
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* === FROSTED GLASS CONTROLS & SEARCH === */
        .controls { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-bottom: 20px;
        }
        select, input[type="text"] { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
            outline: none; 
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        select { cursor: pointer; }
        input[type="text"] { width: 220px; }
        input[type="text"]::placeholder { color: #888; }
        select:hover, input[type="text"]:focus {
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        select option { background: #18181d; color: #fff; }

        /* === PILL FILTERS === */
        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .filter-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0a5ab;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .filter-pill.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        /* === LIVE STATS COUNTER === */
        .stats-counter {
            text-align: center;
            font-size: 16px;
            font-family: 'Rajdhani', sans-serif;
            color: #a0a5ab;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .stats-counter span {
            color: #ffd700;
            font-weight: 800;
            font-size: 18px;
        }

        /* === RESPONSIVE GRID === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 35px 25px; 
        }

        /* === FRAMELESS CARD SHOWCASE === */
        .card-container { 
            position: relative;
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* 🪄 WRAPPER FOR POP-OUT 3D CARD 🪄 */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px; /* Smooth corners for the image itself */
            margin-bottom: 15px;
            transform-style: preserve-3d;
            will-change: transform, box-shadow;
            cursor: zoom-in;
            z-index: 1;
        }

        /* Holographic Light Shine Layer */
        .holo-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 5;
            mix-blend-mode: color-dodge; /* Changed for a more intense gaming look */
        }

        .card-image { 
            width: 100%; 
            border-radius: 12px; 
            display: block;
            pointer-events: none;
            position: relative;
            z-index: 1;
            /* Base shadow so it doesn't look flat before hover */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        
        .card-details {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .card-header { 
            display: flex; 
            justify-content: center;
            align-items: center; 
            gap: 12px;
            width: 100%;
        }
        .card-title { 
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px; 
            font-weight: 700; 
            line-height: 1.1;
            letter-spacing: 0.5px;
            color: #ffffff; 
            margin: 0; 
            text-align: center;
        }
        .card-rating { 
            font-family: 'Rajdhani', sans-serif;
            white-space: nowrap; 
            background: rgba(255, 215, 0, 0.12); 
            color: #ffd700; 
            border: 1px solid rgba(255, 215, 0, 0.35);
            font-weight: 700; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-size: 15px; 
        }
        
        /* === TRANSLUCENT ESPORTS BADGES === */
        .tags { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center;
            gap: 6px; 
        }
        .tag { 
            padding: 3px 10px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: 600; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Position Badges */
        .tag-FW { background: rgba(209, 40, 40, 0.2); color: #ff5e5e; border: 1px solid rgba(209, 40, 40, 0.45); }
        .tag-MF { background: rgba(252, 232, 35, 0.18); color: #ffea3b; border: 1px solid rgba(252, 232, 35, 0.45); }
        .tag-DF { background: rgba(45, 219, 75, 0.18); color: #4ee86e; border: 1px solid rgba(45, 219, 75, 0.45); }
        .tag-GK { background: rgba(42, 111, 214, 0.2); color: #619dff; border: 1px solid rgba(42, 111, 214, 0.45); }
        
        /* Rarity Badges */
        .tag-Legendary { background: rgba(255, 255, 255, 0.06); color: #d1d6dc; border: 1px solid rgba(255, 255, 255, 0.15); }
        .tag-Special { background: rgba(212, 175, 55, 0.15); color: #f0ce54; border: 1px solid rgba(212, 175, 55, 0.4); }
        
        /* Special Edition Badges */
        [class*="tag-Champion"] { background: rgba(13, 58, 153, 0.25); color: #78a2ff; border: 1px solid rgba(13, 58, 153, 0.5); }
        [class*="tag-Classic"] { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.25); }
        [class*="tag-Dream-Star"] { background: rgba(147, 34, 201, 0.22); color: #e084ff; border: 1px solid rgba(147, 34, 201, 0.5); }
        [class*="tag-Kick-Off"] { background: rgba(201, 22, 82, 0.22); color: #ff75a4; border: 1px solid rgba(201, 22, 82, 0.5); }
        [class*="tag-Toty"] { background: rgba(0, 143, 68, 0.22); color: #45f09b; border: 1px solid rgba(0, 143, 68, 0.5); }
        
        /* === FULLSCREEN LIGHTBOX MODAL === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 7, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            position: relative;
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy pop in */
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-caption {
            margin-top: 20px;
            font-size: 28px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 1px;
        }
        .modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            color: #ffffff;
            font-size: 36px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .modal-close:hover { 
            color: #ffd700;
            transform: scale(1.1);
        }

    </style>
</head>
<body>

    <!-- HERO BANNER -->
    <header class="hero-banner">
        <h1>⚽ My DLS Card Collection</h1>
        <div class="subtitle">Ultimate Team Roster</div>
    </header>
    
    <div class="content-wrapper">
        <!-- Controls & Search -->
        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Search player...">
            <select id="sortSelect">
                <option value="ratingDesc">Sort: Rating (High to Low)</option>
                <option value="ratingAsc">Sort: Rating (Low to High)</option>
                <option value="nameAsc">Sort: Name (A-Z)</option>
            </select>
        </div>

        <!-- Sleek Pill Filters -->
        <div class="filter-pills" id="filterContainer">
            <div class="filter-pill active" data-filter="All">All Cards</div>
            <div class="filter-pill" data-filter="Legendary">Legendary</div>
            <div class="filter-pill" data-filter="Special">Special</div>
            <div class="filter-pill" data-filter="FW">Attackers (FW)</div>
            <div class="filter-pill" data-filter="MF">Midfielders (MF)</div>
            <div class="filter-pill" data-filter="DF">Defenders (DF)</div>
            <div class="filter-pill" data-filter="GK">Goalkeepers (GK)</div>
            <div class="filter-pill" data-filter="Champion">Champion</div>
            <div class="filter-pill" data-filter="Classic">Classic</div>
            <div class="filter-pill" data-filter="Dream Star">Dream Star</div>
            <div class="filter-pill" data-filter="Toty">TOTY</div>
        </div>

        <!-- Live Counter -->
        <div class="stats-counter" id="statsCounter">Loading database...</div>

        <!-- Gallery -->
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- Lightbox Zoom Modal -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv"; 
        
        let myCards = []; 
        let currentFilter = "All"; // Track active filter

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const statsCounter = document.getElementById('statsCounter');
        const filterPills = document.querySelectorAll('.filter-pill');

        // Modal elements
        const cardModal = document.getElementById('cardModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');

        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                
                const rows = csvText.split(/\r?\n/).slice(1); 
                
                myCards = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(','); 
                    
                    const name = cols[0] ? cols[0].trim() : "Unknown";
                    const rating = cols[1] ? parseInt(cols[1].trim()) : 0;
                    
                    const tags = [cols[2], cols[3], cols[4]]
                        .map(tag => tag ? tag.trim() : '')
                        .filter(tag => tag !== '');
                        
                    const image = cols[5] ? cols[5].trim() : '';

                    return { name, rating, tags, image };
                });
                
                updateGallery(); 
            } catch (error) {
                console.error("Error loading data:", error);
                gallery.innerHTML = "<p style='color:white; text-align:center; grid-column:1/-1; font-family:Rajdhani;'>Failed to load players.</p>";
            }
        }

        function renderCards(cardsArray) {
            gallery.innerHTML = ''; 
            
            if (cardsArray.length === 0) {
                gallery.innerHTML = "<p style='color:#888; text-align:center; width:100%; grid-column: 1/-1;'>No players found matching your criteria.</p>";
                return;
            }

            cardsArray.forEach(card => {
                let tagsHTML = '';
                card.tags.forEach(tag => {
                    const tagClass = tag.replace(/\s+/g, '-');
                    tagsHTML += `<span class="tag tag-${tagClass}">${tag}</span>`;
                });

                const cardElement = document.createElement('div');
                cardElement.className = 'card-container'; 
                
                cardElement.innerHTML = `
                    <div class="card-image-wrapper">
                        <div class="holo-glare"></div>
                        <img src="images/${card.image}.webp" alt="${card.name}" class="card-image" onerror="this.src='https://via.placeholder.com/300x400/191919/ffffff?text=Image+Missing'">
                    </div>
                    <div class="card-details">
                        <div class="card-header">
                            <div class="card-title">${card.name}</div>
                            <div class="card-rating">★ ${card.rating}</div>
                        </div>
                        <div class="tags">${tagsHTML}</div>
                    </div>
                `;

                const imageWrapper = cardElement.querySelector('.card-image-wrapper');
                const holoGlare = imageWrapper.querySelector('.holo-glare');

                // CLICK TO ZOOM
                imageWrapper.addEventListener('click', () => {
                    modalImage.src = `images/${card.image}.webp`;
                    modalCaption.innerHTML = `${card.name} <span style="color:#ffd700; margin-left:8px;">★ ${card.rating}</span>`;
                    cardModal.classList.add('active');
                });

                // 🪄 DESKTOP ONLY: Dynamic Pop-Out 3D Tilt + Rarity Glow 🪄
                if (isDesktop) {
                    
                    // Determine shadow glow based on rarity/tags
                    let glowColor = "rgba(0, 0, 0, 0.85)"; // Base dark shadow
                    if (card.tags.includes('Legendary')) glowColor = "rgba(255, 215, 0, 0.4)"; // Gold
                    if (card.tags.includes('Champion')) glowColor = "rgba(13, 58, 153, 0.6)"; // Blue
                    if (card.tags.includes('Dream Star')) glowColor = "rgba(147, 34, 201, 0.6)"; // Purple
                    if (card.tags.includes('Toty')) glowColor = "rgba(0, 255, 120, 0.35)"; // Greenish
                    
                    imageWrapper.addEventListener('mouseenter', () => {
                        imageWrapper.style.transition = 'transform 0.08s ease-out';
                        imageWrapper.style.zIndex = '10'; 
                        if (holoGlare) holoGlare.style.opacity = '1';
                    });

                    imageWrapper.addEventListener('mousemove', (e) => {
                        const rect = imageWrapper.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -16;
                        const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 16;
                        
                        // Apply the dynamic glow color to the box-shadow
                        imageWrapper.style.transform = `perspective(800px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(1.08) translateY(-4px)`;
                        imageWrapper.style.boxShadow = `0 25px 50px ${glowColor}`;

                        if (holoGlare) {
                            const percentX = (x / rect.width) * 100;
                            const percentY = (y / rect.height) * 100;
                            // More intense holo glare for the gaming look
                            holoGlare.style.background = `radial-gradient(circle at ${percentX}% ${percentY}%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 215, 0, 0.25) 20%, rgba(255, 105, 180, 0.15) 40%, rgba(0, 212, 255, 0.1) 60%, transparent 80%)`;
                        }
                    });

                    imageWrapper.addEventListener('mouseleave', () => {
                        imageWrapper.style.transition = 'all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1)';
                        imageWrapper.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1) translateY(0px)';
                        imageWrapper.style.boxShadow = '0 10px 20px rgba(0,0,0,0.5)'; // Revert to base shadow
                        imageWrapper.style.zIndex = '1';
                        if (holoGlare) holoGlare.style.opacity = '0';
                    });
                }

                gallery.appendChild(cardElement);
            });
        }

        // Close Modal Handlers
        cardModal.addEventListener('click', (e) => {
            if (e.target === cardModal || e.target.classList.contains('modal-close')) {
                cardModal.classList.remove('active');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cardModal.classList.remove('active');
        });

        // Setup Pill Click Listeners
        filterPills.forEach(pill => {
            pill.addEventListener('click', () => {
                // Remove active class from all pills
                filterPills.forEach(p => p.classList.remove('active'));
                // Add active class to clicked pill
                pill.classList.add('active');
                // Update current filter and refresh gallery
                currentFilter = pill.getAttribute('data-filter');
                updateGallery();
            });
        });

        function updateGallery() {
            let filteredCards = [...myCards];
            
            // Apply Search
            const searchQuery = searchInput.value.toLowerCase().trim();
            if (searchQuery !== "") {
                filteredCards = filteredCards.filter(card => card.name.toLowerCase().includes(searchQuery));
            }

            // Apply Pill Filter
            if (currentFilter !== "All") {
                filteredCards = filteredCards.filter(card => card.tags.includes(currentFilter));
            }
            
            // Apply Sort
            const sortValue = sortSelect.value;
            if (sortValue === "ratingDesc") {
                filteredCards.sort((a, b) => b.rating - a.rating);
            } else if (sortValue === "ratingAsc") {
                filteredCards.sort((a, b) => a.rating - b.rating);
            } else if (sortValue === "nameAsc") {
                filteredCards.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            // Update Stats
            const count = filteredCards.length;
            if (count > 0) {
                const totalRating = filteredCards.reduce((sum, card) => sum + card.rating, 0);
                const avg = (totalRating / count).toFixed(1);
                statsCounter.innerHTML = `Showing <span>${count}</span> Card${count !== 1 ? 's' : ''} &nbsp;|&nbsp; Avg Rating: <span>★ ${avg}</span>`;
            } else {
                statsCounter.innerHTML = `Showing <span>0</span> Cards`;
            }

            renderCards(filteredCards);
        }

        searchInput.addEventListener('input', updateGallery);
        sortSelect.addEventListener('change', updateGallery);

        loadData();
    </script>
</body>
</html>
