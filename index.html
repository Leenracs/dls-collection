<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>
    <style>
        /* === ATMOSPHERIC BASE STYLING === */
        body { 
            background: radial-gradient(circle at 50% 0%, #1a1a24 0%, #0c0c0e 100%); 
            min-height: 100vh;
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff; 
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }
        
        /* === FROSTED GLASS CONTROLS & SEARCH === */
        .controls { 
            max-width: 1200px; 
            margin: 0 auto 30px auto; 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        input[type="text"], select { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 500;
            outline: none; 
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        input[type="text"] {
            width: 220px;
        }
        input[type="text"]:focus, select:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.09);
        }
        input[type="text"]::placeholder {
            color: #777;
        }
        select option {
            background: #18181d;
            color: #fff;
        }

        /* === LIVE COUNTER === */
        .counter {
            text-align: center;
            font-size: 13px;
            color: #9aa0a6;
            margin-top: -15px;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* === RESPONSIVE GRID === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); 
            gap: 22px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* === 3D TILT GRADIENT CARDS === */
        .card-container { 
            position: relative;
            background: linear-gradient(145deg, #18181d, #121215);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px; 
            padding: 14px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
        }

        /* Holographic Glare Overlay */
        .card-shine {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at var(--shine-x, 50%) var(--shine-y, 50%), rgba(255, 255, 255, 0.12) 0%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 2;
        }

        /* Only enable hover lifts on real mouse/desktop devices! */
        @media (hover: hover) and (pointer: fine) {
            .card-container:hover { 
                border-color: rgba(255, 255, 255, 0.22);
                box-shadow: 0 18px 35px rgba(0, 0, 0, 0.7);
            }
            .card-container:hover .card-shine {
                opacity: 1;
            }
        }

        .card-image { 
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            display: block;
            position: relative;
            z-index: 1;
        }

            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
