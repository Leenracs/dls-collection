<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>
    <style>
        /* === BASE STYLING === */
        body { 
            background-color: #141414; 
            color: #d4d4d4; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 20px; 
            color: #ffffff; 
        }
        
        /* === CONTROL PANEL === */
        .controls { 
            max-width: 1200px; 
            margin: 0 auto 30px auto; 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        select { 
            background-color: #262626; 
            color: white; 
            border: 1px solid #444; 
            padding: 10px 15px; 
            border-radius: 6px; 
            font-size: 14px; 
            cursor: pointer; 
            outline: none;
        }

        /* === RESPONSIVE GRID === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 24px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* === SLEEK UNIFORM CARD BACKGROUNDS === */
        .card-container { 
            background-color: #262626;
            border: 1px solid #363636;
            border-radius: 10px; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .card-container:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-color: #555555;
        }

        .card-image { 
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 15px; 
        }
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }
        .card-title { 
            font-size: 15px; 
            font-weight: 600; 
            text-transform: uppercase; 
            color: #ffffff; 
            margin: 0; 
        }
        .card-rating { 
            background-color: #ffd700; 
            color: #000; 
            font-weight: bold; 
            padding: 3px 8px; 
            border-radius: 12px; 
            font-size: 13px; 
        }
        
        /* === TAGS STYLING === */
        .tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        .tag { 
            padding: 4px 9px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        
        /* EXACT DLS POSITION BADGES */
        .tag-FW { background-color: #d12828; color: #ffffff; } /* DLS Red + White text */
        .tag-MF { background-color: #fce823; color: #000000; } /* DLS Bright Yellow + Black text */
        .tag-DF { background-color: #2ddb4b; color: #000000; } /* DLS Bright Green + Black text */
        .tag-GK { background-color: #2a6fd6; color: #ffffff; } /* DLS Blue + White text */
        
        /* Rarity Backgrounds */
        .tag-Legendary { background-color: #4a4e52; color: #ffffff; } /* Gunmetal Grey */
        .tag-Special { background-color: #d4af37; color: #000000; } /* Clean Gold */
        
        /* Special Edition Player Backgrounds */
        .tag-Champion { background-color: #0d3a99; color: #ffffff; } /* Champions Blue */
        .tag-Classic { background-color: #1c1c1c; color: #ffffff; border: 1px solid #777; } /* Classic Black/Silver */
        .tag-Dream-Star { background-color: #9322c9; color: #ffffff; } /* Vibrant Purple */
        .tag-Kick-Off-Star { background-color: #c91652; color: #ffffff; } /* Deep Pink/Red */
        
        /* Catches "Toty 2025", "Toty 2026", etc. automatically */
        [class*="tag-Toty"] { background-color: #008f44; color: #ffffff; } /* Green */
        
    </style>
</head>
<body>

    <h1>📒 My DLS Card Collection</h1>
    
    <!-- Controls -->
    <div class="controls">
        <select id="sortSelect">
            <option value="ratingDesc">Sort by Rating (High to Low)</option>
            <option value="ratingAsc">Sort by Rating (Low to High)</option>
            <option value="nameAsc">Sort by Name (A-Z)</option>
        </select>
        <select id="filterSelect">
            <option value="All">All Cards</option>
            <option value="Legendary">Legendary</option>
            <option value="Special">Special</option>
            <option value="FW">Forwards (FW)</option>
            <option value="MF">Midfielders (MF)</option>
            <option value="DF">Defenders (DF)</option>
            <option value="GK">Goalkeepers (GK)</option>
            <option value="Champion">Champion</option>
            <option value="Classic">Classic</option>
            <option value="Dream Star">Dream Star</option>
            <option value="Kick-Off Star">Kick-Off Star</option>
        </select>
    </div>

    <!-- Gallery -->
    <div class="gallery" id="gallery">
        <p style="text-align: center; width: 100%;">Loading players...</p>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv"; 
        
        let myCards = []; 
        const gallery = document.getElementById('gallery');
        const sortSelect = document.getElementById('sortSelect');
        const filterSelect = document.getElementById('filterSelect');

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                
                const rows = csvText.split(/\r?\n/).slice(1); 
                
                myCards = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(','); 
                    
                    const name = cols[0] ? cols[0].trim() : "Unknown";
                    const rating = cols[1] ? parseInt(cols[1].trim()) : 0;
                    
                    const tags = [cols[2], cols[3], cols[4]]
                        .map(tag => tag ? tag.trim() : '')
                        .filter(tag => tag !== '');
                        
                    const image = cols[5] ? cols[5].trim() : '';

                    return { name, rating, tags, image };
                });
                
                updateGallery(); 
            } catch (error) {
                console.error("Error loading data:", error);
                gallery.innerHTML = "<p style='color:white; text-align:center;'>Failed to load players.</p>";
            }
        }

        function renderCards(cardsArray) {
            gallery.innerHTML = ''; 
            
            cardsArray.forEach(card => {
                let tagsHTML = '';
                card.tags.forEach(tag => {
                    const tagClass = tag.replace(/\s+/g, '-');
                    tagsHTML += `<span class="tag tag-${tagClass}">${tag}</span>`;
                });

                const cardElement = document.createElement('div');
                cardElement.className = 'card-container'; 
                
                cardElement.innerHTML = `
                    <img src="images/${card.image}.webp" alt="${card.name}" class="card-image" onerror="this.src='https://via.placeholder.com/300x400/191919/ffffff?text=Image+Missing'">
                    <div class="card-header">
                        <div class="card-title">${card.name}</div>
                        <div class="card-rating">${card.rating}</div>
                    </div>
                    <div class="tags">${tagsHTML}</div>
                `;
                gallery.appendChild(cardElement);
            });
        }

        function updateGallery() {
            let filteredCards = [...myCards];
            
            const filterValue = filterSelect.value;
            if (filterValue !== "All") {
                filteredCards = filteredCards.filter(card => card.tags.includes(filterValue));
            }
            
            const sortValue = sortSelect.value;
            if (sortValue === "ratingDesc") {
                filteredCards.sort((a, b) => b.rating - a.rating);
            } else if (sortValue === "ratingAsc") {
                filteredCards.sort((a, b) => a.rating - b.rating);
            } else if (sortValue === "nameAsc") {
                filteredCards.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            renderCards(filteredCards);
        }

        sortSelect.addEventListener('change', updateGallery);
        filterSelect.addEventListener('change', updateGallery);

        loadData();
    </script>
</body>
</html>
