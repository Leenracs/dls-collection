<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Card Archive</title>
    <style>
        /* === CLEAN & PREMIUM BASE === */
        body { 
            background: #0f1014; /* Deep, clean dark background */
            min-height: 100vh;
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 50px 20px; 
            -webkit-font-smoothing: antialiased;
        }

        /* === 2 & 7. HERO SECTION & PERSONALITY === */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .hero p {
            font-size: 1.1rem;
            color: #8b929a;
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        /* === 6. COLLECTION STATS (PILLS) === */
        .stats-pills {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-pill {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #a0a5ab;
            backdrop-filter: blur(10px);
        }
        .stat-pill span {
            color: #ffd700;
            font-weight: 700;
            margin-left: 4px;
        }

        /* === 5. BETTER SPACING (CONTAINERS) === */
        .controls-section {
            max-width: 1200px;
            margin: 0 auto 50px auto; /* Breathing room! */
        }

        /* === 3. BIGGER SEARCH BAR & SORT === */
        .search-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        input[type="text"] { 
            width: 100%;
            max-width: 450px; /* BIGGER SEARCH BAR */
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 14px 24px; 
            border-radius: 30px; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.2s;
        }
        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }
        select {
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 13px 20px; 
            border-radius: 30px; 
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }
        select option { background: #18181d; color: #fff; }

        /* === 8. FILTER CHIPS === */
        .filter-chips {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0a5ab;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .chip:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .chip.active {
            background: #e0e0e0;
            color: #000;
            border-color: #e0e0e0;
        }

        /* === 1. CARDS ARE THE STARS === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 35px; /* More space between cards */
            max-width: 1300px; 
            margin: 0 auto; 
            padding-bottom: 50px;
        }

        .card-container {
            position: relative;
            background: transparent; /* NO MORE BLACK BOX */
            border: none; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: zoom-in;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* BONUS: RECENTLY ADDED BADGE */
        .badge-new {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #ff3b3b, #ff8c00);
            color: #fff;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(255, 59, 59, 0.4);
            pointer-events: none;
        }

        .card-image { 
            width: 100%; 
            display: block;
            border-radius: 12px; /* Smooth corners */
            /* Using drop-shadow instead of box-shadow hugs the actual card shape perfectly */
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4));
            transition: filter 0.3s ease, transform 0.1s ease-out;
            will-change: transform, filter;
        }

        /* === 10. TINY HOVER ANIMATION === */
        .card-container:hover .card-image {
            filter: drop-shadow(0 25px 40px rgba(0,0,0,0.7)) brightness(1.08); /* Brighter + deeper shadow */
        }

        /* === 4. FULLSCREEN CARD VIEWER === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(15px); /* Strong background blur */
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.7); /* Starts smaller */
            /* Longer, smoother easing for that premium feel */
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-image {
            height: 85vh; /* Very large! */
            max-height: 650px; /* Capped for huge screens */
            width: auto;
            border-radius: 16px;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.8));
        }
        .modal-caption {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .modal-close {
            position: absolute;
            top: -40px;
            right: -40px;
            color: #ffffff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .modal-close:hover { color: #ffd700; transform: scale(1.1); }
        
        /* Mobile adjustment for close button */
        @media (max-width: 768px) {
            .modal-close { right: 0; top: -50px; }
            .modal-image { width: 90vw; height: auto; max-height: none; }
        }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <header class="hero">
        <h1>Ultimate Card Archive</h1>
        <p>Dream League Soccer Collection • Updated regularly</p>
        <div class="stats-pills" id="statsPills">
            <!-- Injected dynamically via JS -->
            <div class="stat-pill">Loading Data...</div>
        </div>
    </header>
    
    <!-- CONTROLS & FILTER CHIPS -->
    <div class="controls-section">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="🔍 Search Messi, Ronaldo, Rodri...">
            <select id="sortSelect">
                <option value="ratingDesc">Rating (High to Low)</option>
                <option value="ratingAsc">Rating (Low to High)</option>
                <option value="nameAsc">Name (A-Z)</option>
            </select>
        </div>
        
        <div class="filter-chips" id="filterChips">
            <div class="chip active" data-filter="All">All</div>
            <div class="chip" data-filter="FW">FW</div>
            <div class="chip" data-filter="MF">MF</div>
            <div class="chip" data-filter="DF">DF</div>
            <div class="chip" data-filter="GK">GK</div>
            <div class="chip" data-filter="Legendary">Legendary</div>
            <div class="chip" data-filter="Special">Special</div>
            <div class="chip" data-filter="Champion">Champion</div>
            <div class="chip" data-filter="Toty">TOTY</div>
        </div>
    </div>

    <!-- GALLERY (CARDS ONLY) -->
    <div class="gallery" id="gallery"></div>

    <!-- SMOOTH FULLSCREEN MODAL -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv"; 
        
        let myCards = []; 
        let currentFilter = "All"; // Tracks active chip

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const filterChips = document.querySelectorAll('.chip');
        const statsPills = document.getElementById('statsPills');

        const cardModal = document.getElementById('cardModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');

        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                
                const rows = csvText.split(/\r?\n/).slice(1); 
                
                myCards = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(','); 
                    const name = cols[0] ? cols[0].trim() : "Unknown";
                    const rating = cols[1] ? parseInt(cols[1].trim()) : 0;
                    const tags = [cols[2], cols[3], cols[4]].map(t => t ? t.trim() : '').filter(t => t !== '');
                    const image = cols[5] ? cols[5].trim() : '';

                    return { name, rating, tags, image };
                });
                
                updateStats(); // Setup Top Pills
                updateGallery(); // Render
            } catch (error) {
                console.error("Error loading data:", error);
                gallery.innerHTML = "<p style='color:#8b929a; text-align:center; width:100%;'>Failed to load collection.</p>";
            }
        }

        function updateStats() {
            const total = myCards.length;
            if (total === 0) return;

            const totalRating = myCards.reduce((sum, card) => sum + card.rating, 0);
            const avgRating = (totalRating / total).toFixed(1);
            
            const legendaryCount = myCards.filter(c => c.tags.includes("Legendary")).length;
            // Assume anything that isn't specifically 'Legendary' or standard has a 'Special' or 'Champion' etc tag. 
            // Checking strictly for 'Special' to keep it clean.
            const specialCount = myCards.filter(c => c.tags.includes("Special")).length;

            statsPills.innerHTML = `
                <div class="stat-pill">Total Collection: <span>${total} Cards</span></div>
                <div class="stat-pill">Legendary: <span>${legendaryCount}</span></div>
                <div class="stat-pill">Special: <span>${specialCount}</span></div>
                <div class="stat-pill">Average OVR: <span>★ ${avgRating}</span></div>
            `;
        }

        // Handle Filter Chips Logic
        filterChips.forEach(chip => {
            chip.addEventListener('click', (e) => {
                // Remove active class from all
                filterChips.forEach(c => c.classList.remove('active'));
                // Add active class to clicked
                e.target.classList.add('active');
                // Update filter state and re-render
                currentFilter = e.target.getAttribute('data-filter');
                updateGallery();
            });
        });

        function renderCards(cardsArray) {
            gallery.innerHTML = ''; 
            
            if (cardsArray.length === 0) {
                gallery.innerHTML = "<p style='color:#8b929a; text-align:center; width:100%; grid-column: 1/-1;'>No cards found matching this search.</p>";
                return;
            }

            cardsArray.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card-container'; 
                
                // Only showing the "NEW" badge on the first 3 cards of the FULL array (assuming top of sheet = newest)
                // We check if this specific card's name/rating exists within the top 3 of the original myCards array
                const isNew = myCards.findIndex(c => c.name === card.name && c.rating === card.rating) < 3;
                const badgeHTML = isNew ? `<div class="badge-new">NEW</div>` : '';

                cardElement.innerHTML = `
                    ${badgeHTML}
                    <img src="images/${card.image}.webp" alt="${card.name}" class="card-image" onerror="this.src='https://via.placeholder.com/300x400/151515/333333?text=Missing'">
                `;

                const imgElement = cardElement.querySelector('.card-image');

                // MODAL CLICK
                cardElement.addEventListener('click', () => {
                    modalImage.src = `images/${card.image}.webp`;
                    modalCaption.innerHTML = `${card.name} <span style="color:#ffd700; margin-left:12px;">★ ${card.rating}</span>`;
                    cardModal.classList.add('active');
                });

                // DESKTOP 3D TILT (Applied only to the image)
                if (isDesktop) {
                    cardElement.addEventListener('mousemove', (e) => {
                        const rect = cardElement.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -12;
                        const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 12;
                        
                        imgElement.style.transform = `rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg)`;
                    });

                    cardElement.addEventListener('mouseleave', () => {
                        imgElement.style.transform = 'rotateX(0deg) rotateY(0deg)';
                    });
                }

                gallery.appendChild(cardElement);
            });
        }

        // Close Modal
        cardModal.addEventListener('click', (e) => {
            if (e.target === cardModal || e.target.classList.contains('modal-close')) {
                cardModal.classList.remove('active');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cardModal.classList.remove('active');
        });

        function updateGallery() {
            let filteredCards = [...myCards];
            
            // Text Search
            const searchQuery = searchInput.value.toLowerCase().trim();
            if (searchQuery !== "") {
                filteredCards = filteredCards.filter(card => card.name.toLowerCase().includes(searchQuery));
            }

            // Chip Filter
            if (currentFilter !== "All") {
                filteredCards = filteredCards.filter(card => card.tags.some(tag => tag.toLowerCase().includes(currentFilter.toLowerCase())));
            }
            
            // Sort
            const sortValue = sortSelect.value;
            if (sortValue === "ratingDesc") {
                filteredCards.sort((a, b) => b.rating - a.rating);
            } else if (sortValue === "ratingAsc") {
                filteredCards.sort((a, b) => a.rating - b.rating);
            } else if (sortValue === "nameAsc") {
                filteredCards.sort((a, b) => a.name.localeCompare(b.name));
            }

            renderCards(filteredCards);
        }

        searchInput.addEventListener('input', updateGallery);
        sortSelect.addEventListener('change', updateGallery);

        loadData();
    </script>
</body>
</html>
