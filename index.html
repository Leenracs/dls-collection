<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>

    <style>
        :root {
            --bg: #08080c;
            --gold: #ffd700;
            --text: #ffffff;
            --muted: #9ca3af;
        }

        *{*
            box-sizing: border-box;
        }

        html {
            background: #08080c;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 32px 18px 50px;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 0%, rgba(255, 215, 0, 0.13), transparent 30%),
                radial-gradient(circle at 82% 5%, rgba(80, 120, 255, 0.16), transparent 32%),
                radial-gradient(circle at 50% 100%, rgba(180, 60, 255, 0.09), transparent 38%),
                linear-gradient(180deg, #101018 0%, #08080c 58%, #070709 100%);
            background-color: #08080c;
            overflow-x: hidden;
        }

        .hero {
            max-width: 1200px;
            margin: 0 auto 18px;
            padding: 38px 22px;
            text-align: center;
            border-radius: 24px;
            background:
                linear-gradient(135deg, rgba(255, 215, 0, 0.14), transparent 35%),
                linear-gradient(225deg, rgba(80, 120, 255, 0.16), transparent 42%),
                rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 18px 55px rgba(0,0,0,0.42);
        }

        .hero-kicker {
            color: var(--gold);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.2px;
            margin-bottom: 10px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 62px);
            line-height: 0.98;
            font-weight: 950;
            letter-spacing: -1.8px;
            color: #ffffff;
            text-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .hero p {
            max-width: 620px;
            margin: 14px auto 0;
            color: #aeb5c0;
            font-size: 15px;
            line-height: 1.55;
        }

        .summary-grid {
            max-width: 1200px;
            margin: 0 auto 18px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .summary-card {
            padding: 16px 12px;
            text-align: center;
            border-radius: 16px;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }

        .summary-card .value {
            font-size: 24px;
            font-weight: 950;
            color: var(--gold);
        }

        .summary-card .label {
            margin-top: 4px;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.1px;
            font-weight: 800;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 15px auto;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 35px rgba(0,0,0,0.28);
        }

        select,
        input[type="text"],
        button {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.13);
            padding: 11px 16px;
            border-radius: 11px;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }

        select {
            cursor: pointer;
        }

        input[type="text"] {
            width: min(330px, 100%);
        }

        input[type="text"]::placeholder {
            color: #858b96;
        }

        select:hover,
        input[type="text"]:focus,
        button:hover {
            border-color: rgba(255, 255, 255, 0.34);
            background: rgba(255, 255, 255, 0.095);
        }

        select option {
            background: #18181d;
            color: #fff;
        }

        button {
            color: var(--gold);
            cursor: pointer;
            border-color: rgba(255,215,0,0.28);
            background: rgba(255,215,0,0.1);
        }

        .stats-counter {
            text-align: center;
            font-size: 13px;
            color: #a0a5ab;
            margin-bottom: 28px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .stats-counter span {
            color: var(--gold);
            font-weight: 950;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(245px, 280px));
            justify-content: center;
            gap: 22px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card-container {
            position: relative;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.065), rgba(255,255,255,0.022)),
                linear-gradient(145deg, #18181d, #101014);
            border: 1px solid rgba(255, 255, 255, 0.075);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
            overflow: hidden;
        }

        .card-container:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.17);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.62);
        }

        .card-container.rarity-special {
            border-color: rgba(240, 206, 84, 0.25);
            box-shadow: 0 14px 34px rgba(240, 206, 84, 0.08), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-container.rarity-champion {
            border-color: rgba(90, 135, 255, 0.32);
            box-shadow: 0 14px 34px rgba(70, 120, 255, 0.11), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-container.rarity-dream {
            border-color: rgba(224, 132, 255, 0.32);
            box-shadow: 0 14px 34px rgba(190, 80, 255, 0.12), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-container.rarity-toty {
            border-color: rgba(69, 240, 155, 0.3);
            box-shadow: 0 14px 34px rgba(69, 240, 155, 0.1), 0 14px 34px rgba(0,0,0,0.45);
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 14px;
            margin-bottom: 13px;
            padding: 10px;
            cursor: zoom-in;
            background:
                radial-gradient(circle at 50% 12%, rgba(255,255,255,0.15), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.07);
        }

        .holo-glare {
            display: none;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 10px;
            display: block;
            background: #111;
            box-shadow: 0 9px 20px rgba(0,0,0,0.42);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-top: 2px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: 0.35px;
            color: #ffffff;
            margin: 0;
            word-break: break-word;
        }

        .card-rating {
            white-space: nowrap;
            flex-shrink: 0;
            background: rgba(255, 215, 0, 0.13);
            color: var(--gold);
            border: 1px solid rgba(255, 215, 0, 0.36);
            font-weight: 950;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            letter-spacing: 0.4px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 4px 2px;
        }

        .tag {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10.5px;
            font-weight: 850;
            letter-spacing: 0.55px;
            text-transform: uppercase;
        }

        .tag-FW { background: rgba(209, 40, 40, 0.2); color: #ff5e5e; border: 1px solid rgba(209, 40, 40, 0.45); }
        .tag-MF { background: rgba(252, 232, 35, 0.18); color: #ffea3b; border: 1px solid rgba(252, 232, 35, 0.45); }
        .tag-DF { background: rgba(45, 219, 75, 0.18); color: #4ee86e; border: 1px solid rgba(45, 219, 75, 0.45); }
        .tag-GK { background: rgba(42, 111, 214, 0.2); color: #619dff; border: 1px solid rgba(42, 111, 214, 0.45); }

        .tag-Legendary { background: rgba(255, 255, 255, 0.06); color: #b6bdc8; border: 1px solid rgba(255, 255, 255, 0.16); }
        .tag-Special { background: rgba(212, 175, 55, 0.15); color: #f0ce54; border: 1px solid rgba(212, 175, 55, 0.4); }

        [class*="tag-Champion"] { background: rgba(13, 58, 153, 0.25); color: #78a2ff; border: 1px solid rgba(13, 58, 153, 0.5); }*
        [class*="tag-Classic"] { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.25); }*
        [class*="tag-Dream-Star"] { background: rgba(147, 34, 201, 0.22); color: #e084ff; border: 1px solid rgba(147, 34, 201, 0.5); }*
        [class*="tag-Kick-Off"] { background: rgba(201, 22, 82, 0.22); color: #ff75a4; border: 1px solid rgba(201, 22, 82, 0.5); }*
        [class*="tag-Toty"] { background: rgba(0, 143, 68, 0.22); color: #45f09b; border: 1px solid rgba(0, 143, 68, 0.5); }*

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.86);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            max-width: 410px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.9);
            transition: transform 0.25s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: #111;
        }

        .modal-caption {
            margin-top: 15px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 16px;
            font-weight: 950;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.4px;
        }

        .modal-close {
            position: absolute;
            top: -48px;
            right: 0;
            color: #ffffff;
            font-size: 34px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .modal-close:hover {
            color: var(--gold);
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 34px 20px;
            text-align: center;
            color: #aab0ba;
            border: 1px dashed rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.035);
            border-radius: 18px;
        }

        .empty-state strong {
            color: #fff;
        }

        @media (max-width: 800px) {
            body {
                padding: 22px 13px 40px;
            }

            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .controls {
                justify-content: stretch;
            }

            select,
            input[type="text"],
            button {
                width: 100%;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                gap: 16px;
            }

            .hero {
                padding: 30px 16px;
            }
        }
    </style>
</head>

<body>
    <header class="hero">
        <div class="hero-kicker">Dream League Soccer</div>
        <h1>My DLS Card Collection</h1>
        <p>Browse, filter and showcase your custom DLS cards with ratings, positions, rarity badges and full-screen previews.</p>
    </header>

    <section class="summary-grid" id="summaryGrid">
        <div class="summary-card">
            <div class="value">—</div>
            <div class="label">Total Cards</div>
        </div>
        <div class="summary-card">
            <div class="value">—</div>
            <div class="label">Average</div>
        </div>
        <div class="summary-card">
            <div class="value">—</div>
            <div class="label">Best Rating</div>
        </div>
        <div class="summary-card">
            <div class="value">—</div>
            <div class="label">Specials</div>
        </div>
    </section>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 Search player...">

        <select id="sortSelect">
            <option value="ratingDesc">Sort by Rating: High to Low</option>
            <option value="ratingAsc">Sort by Rating: Low to High</option>
            <option value="nameAsc">Sort by Name: A-Z</option>
            <option value="nameDesc">Sort by Name: Z-A</option>
        </select>

        <select id="filterSelect">
            <option value="All">All Cards</option>
            <option value="Legendary">Legendary</option>
            <option value="Special">Special</option>
            <option value="FW">Forwards (FW)</option>
            <option value="MF">Midfielders (MF)</option>
            <option value="DF">Defenders (DF)</option>
            <option value="GK">Goalkeepers (GK)</option>
            <option value="Champion">Champion</option>
            <option value="Classic">Classic</option>
            <option value="Dream Star">Dream Star</option>
            <option value="Kick-Off Star">Kick-Off Star</option>
            <option value="Toty">TOTY</option>
        </select>

        <button id="resetButton" type="button">Reset</button>
    </div>

    <div class="stats-counter" id="statsCounter">Loading stats...</div>

    <main class="gallery" id="gallery"></main>

    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">×</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv";

var myCards = [];

var gallery = document.getElementById("gallery");
var searchInput = document.getElementById("searchInput");
var sortSelect = document.getElementById("sortSelect");
var filterSelect = document.getElementById("filterSelect");
var statsCounter = document.getElementById("statsCounter");
var summaryGrid = document.getElementById("summaryGrid");
var resetButton = document.getElementById("resetButton");

var cardModal = document.getElementById("cardModal");
var modalImage = document.getElementById("modalImage");
var modalCaption = document.getElementById("modalCaption");
var modalClose = document.getElementById("modalClose");

statsCounter.innerHTML = "JS started. Loading CSV...";

function getImageSrc(imageName) {
    imageName = String(imageName || "").trim();

    if (imageName === "") {
        return "https://via.placeholder.com/300x420/191919/ffffff?text=Image+Missing";
    }

    if (imageName.indexOf("http://") === 0 || imageName.indexOf("https://") === 0) {
        return imageName;
    }

    if (
        imageName.toLowerCase().endsWith(".webp") ||
        imageName.toLowerCase().endsWith(".png") ||
        imageName.toLowerCase().endsWith(".jpg") ||
        imageName.toLowerCase().endsWith(".jpeg")
    ) {
        return "images/" + imageName;
    }

    return "images/" + imageName + ".webp";
}

function makeTagClass(tag) {
    return String(tag || "")
        .trim()
        .replace(/[^a-zA-Z0-9 ]/g, "")
        .replace(/\s+/g, "-");
}

function loadData() {
    fetch(sheetURL)
        .then(function(response) {
            return response.text();
        })
        .then(function(csvText) {
            var lines = csvText.trim().split(/\r?\n/);

            myCards = [];

            for (var i = 1; i < lines.length; i++) {
                var cols = lines[i].split(",");

                var name = cols[0] ? cols[0].trim() : "";
                var rating = cols[1] ? parseInt(cols[1].trim(), 10) : 0;
                var position = cols[2] ? cols[2].trim() : "";
                var rarity = cols[3] ? cols[3].trim() : "";
                var edition = cols[4] ? cols[4].trim() : "";
                var image = cols[5] ? cols[5].trim() : "";

                if (name === "") {
                    continue;
                }

                var tags = [];

                if (position !== "") {
                    tags.push(position);
                }

                if (rarity !== "") {
                    tags.push(rarity);
                }

                if (edition !== "") {
                    tags.push(edition);
                }

                myCards.push({
                    name: name,
                    rating: rating,
                    tags: tags,
                    image: image
                });
            }

            updateSummary();
            updateGallery();
        })
        .catch(function(error) {
            statsCounter.innerHTML = "Failed to load CSV: " + error.message;
        });
}

function updateSummary() {
    var total = myCards.length;
    var totalRating = 0;
    var bestRating = 0;
    var specials = 0;

    for (var i = 0; i < myCards.length; i++) {
        totalRating += myCards[i].rating;

        if (myCards[i].rating > bestRating) {
            bestRating = myCards[i].rating;
        }

        if (myCards[i].tags.indexOf("Special") !== -1) {
            specials++;
        }
    }

    var avg = total > 0 ? (totalRating / total).toFixed(1) : "0.0";

    if (summaryGrid) {
        summaryGrid.innerHTML =
            '<div class="summary-card">' +
                '<div class="value">' + total + '</div>' +
                '<div class="label">Total Cards</div>' +
            '</div>' +
            '<div class="summary-card">' +
                '<div class="value">★ ' + avg + '</div>' +
                '<div class="label">Average</div>' +
            '</div>' +
            '<div class="summary-card">' +
                '<div class="value">★ ' + bestRating + '</div>' +
                '<div class="label">Best Rating</div>' +
            '</div>' +
            '<div class="summary-card">' +
                '<div class="value">' + specials + '</div>' +
                '<div class="label">Specials</div>' +
            '</div>';
    }
}

function updateGallery() {
    var cards = myCards.slice();

    var search = "";
    var filter = "All";
    var sort = "ratingDesc";

    if (searchInput) {
        search = searchInput.value.toLowerCase().trim();
    }

    if (filterSelect) {
        filter = filterSelect.value;
    }

    if (sortSelect) {
        sort = sortSelect.value;
    }

    if (search !== "") {
        cards = cards.filter(function(card) {
            var inName = card.name.toLowerCase().indexOf(search) !== -1;
            var inTags = false;

            for (var i = 0; i < card.tags.length; i++) {
                if (card.tags[i].toLowerCase().indexOf(search) !== -1) {
                    inTags = true;
                }
            }

            return inName || inTags;
        });
    }

    if (filter !== "All") {
        cards = cards.filter(function(card) {
            for (var i = 0; i < card.tags.length; i++) {
                var tag = card.tags[i].toLowerCase();
                var wanted = filter.toLowerCase();

                if (tag === wanted || tag.indexOf(wanted) !== -1) {
                    return true;
                }
            }

            return false;
        });
    }

    if (sort === "ratingDesc") {
        cards.sort(function(a, b) {
            return b.rating - a.rating;
        });
    }

    if (sort === "ratingAsc") {
        cards.sort(function(a, b) {
            return a.rating - b.rating;
        });
    }

    if (sort === "nameAsc") {
        cards.sort(function(a, b) {
            return a.name.localeCompare(b.name);
        });
    }

    if (sort === "nameDesc") {
        cards.sort(function(a, b) {
            return b.name.localeCompare(a.name);
        });
    }

    var count = cards.length;
    var totalRating = 0;

    for (var r = 0; r < cards.length; r++) {
        totalRating += cards[r].rating;
    }

    var avg = count > 0 ? (totalRating / count).toFixed(1) : "0.0";

    statsCounter.innerHTML =
        'Showing <span>' + count + '</span> Card' +
        (count === 1 ? "" : "s") +
        ' | Avg Rating: <span>★ ' + avg + '</span>';

    renderCards(cards);
}

function renderCards(cards) {
    gallery.innerHTML = "";

    if (cards.length === 0) {
        gallery.innerHTML =
            '<div class="empty-state">' +
                '<strong>No players found.</strong><br>' +
                'Try changing your search or filters.' +
            '</div>';
        return;
    }

    for (var i = 0; i < cards.length; i++) {
        var card = cards[i];

        var cardElement = document.createElement("article");
        cardElement.className = "card-container";

        var joinedTags = card.tags.join(" ").toLowerCase();

        if (joinedTags.indexOf("special") !== -1) {
            cardElement.classList.add("rarity-special");
        }

        if (joinedTags.indexOf("champion") !== -1) {
            cardElement.classList.add("rarity-champion");
        }

        if (joinedTags.indexOf("dream") !== -1) {
            cardElement.classList.add("rarity-dream");
        }

        if (joinedTags.indexOf("toty") !== -1) {
            cardElement.classList.add("rarity-toty");
        }

        var wrapper = document.createElement("div");
        wrapper.className = "card-image-wrapper";

        var glare = document.createElement("div");
        glare.className = "holo-glare";

        var img = document.createElement("img");
        img.className = "card-image";
        img.src = getImageSrc(card.image);
        img.alt = card.name;

        img.onerror = function() {
            this.src = "https://via.placeholder.com/300x420/191919/ffffff?text=Image+Missing";
        };

        wrapper.appendChild(glare);
        wrapper.appendChild(img);

        var header = document.createElement("div");
        header.className = "card-header";

        var title = document.createElement("div");
        title.className = "card-title";
        title.textContent = card.name;

        var rating = document.createElement("div");
        rating.className = "card-rating";
        rating.textContent = "★ " + card.rating;

        header.appendChild(title);
        header.appendChild(rating);

        var tagsDiv = document.createElement("div");
        tagsDiv.className = "tags";

        for (var t = 0; t < card.tags.length; t++) {
            var tag = document.createElement("span");
            tag.className = "tag tag-" + makeTagClass(card.tags[t]);
            tag.textContent = card.tags[t];
            tagsDiv.appendChild(tag);
        }

        cardElement.appendChild(wrapper);
        cardElement.appendChild(header);
        cardElement.appendChild(tagsDiv);

        attachModalClick(wrapper, card);

        gallery.appendChild(cardElement);
    }
}

function attachModalClick(wrapper, card) {
    wrapper.addEventListener("click", function() {
        if (!cardModal) {
            return;
        }

        modalImage.src = getImageSrc(card.image);
        modalImage.alt = card.name;
        modalCaption.innerHTML = card.name + ' <span style="color:#ffd700; margin-left:8px;">★ ' + card.rating + '</span>';
        cardModal.classList.add("active");
    });
}

if (searchInput) {
    searchInput.addEventListener("input", updateGallery);
}

if (sortSelect) {
    sortSelect.addEventListener("change", updateGallery);
}

if (filterSelect) {
    filterSelect.addEventListener("change", updateGallery);
}

if (resetButton) {
    resetButton.addEventListener("click", function() {
        searchInput.value = "";
        sortSelect.value = "ratingDesc";
        filterSelect.value = "All";
        updateGallery();
    });
}

if (cardModal) {
    cardModal.addEventListener("click", function(event) {
        if (event.target === cardModal) {
            cardModal.classList.remove("active");
        }
    });
}

if (modalClose) {
    modalClose.addEventListener("click", function() {
        cardModal.classList.remove("active");
    });
}

loadData();
    </script>
</body>
</html>
