<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>
    <style>
        /* === ATMOSPHERIC BASE STYLING === */
        body { 
            background: radial-gradient(circle at 50% 0%, #1a1a24 0%, #0c0c0e 100%); 
            min-height: 100vh;
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff; 
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }
        
        /* === FROSTED GLASS CONTROLS & SEARCH === */
        .controls { 
            max-width: 1200px; 
            margin: 0 auto 15px auto; 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        select, input[type="text"] { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 500;
            outline: none; 
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        select { cursor: pointer; }
        input[type="text"] { width: 200px; }
        input[type="text"]::placeholder { color: #888; }
        select:hover, input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.09);
        }
        select option {
            background: #18181d;
            color: #fff;
        }

        /* === LIVE STATS COUNTER === */
        .stats-counter {
            text-align: center;
            font-size: 13px;
            color: #a0a5ab;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .stats-counter span {
            color: #ffd700;
            font-weight: 700;
        }

        /* === RESPONSIVE GRID === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); 
            gap: 22px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* === GROUNDED SHOWCASE CONTAINER === */
        .card-container { 
            position: relative;
            background: linear-gradient(145deg, #18181d, #121215);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px; 
            padding: 14px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .card-container:hover {
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.65);
        }

        /* 🪄 WRAPPER FOR POP-OUT 3D CARD 🪄 */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
            transform-style: preserve-3d;
            will-change: transform;
            cursor: zoom-in; /* Magnifying glass cursor tells people they can click! */
            z-index: 1;
        }

        /* Holographic Light Shine Layer */
        .holo-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 5;
            mix-blend-mode: screen;
        }

        .card-image { 
            width: 100%; 
            border-radius: 8px; 
            display: block;
            pointer-events: none;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            gap: 10px;
            margin-top: 4px;
            margin-bottom: 12px; 
            padding: 0 4px;
        }
        .card-title { 
            font-size: 15px; 
            font-weight: 700; 
            line-height: 1.3;
            letter-spacing: 0.5px;
            color: #ffffff; 
            margin: 0; 
            word-break: break-word;
        }
        .card-rating { 
            white-space: nowrap; 
            flex-shrink: 0; 
            background: rgba(255, 215, 0, 0.12); 
            color: #ffd700; 
            border: 1px solid rgba(255, 215, 0, 0.35);
            font-weight: 800; 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 12px; 
            letter-spacing: 0.5px;
        }
        
        /* === TRANSLUCENT ESPORTS BADGES === */
        .tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            padding: 0 4px;
        }
        .tag { 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
        }
        
        /* Position Badges */
        .tag-FW { background: rgba(209, 40, 40, 0.2); color: #ff5e5e; border: 1px solid rgba(209, 40, 40, 0.45); }
        .tag-MF { background: rgba(252, 232, 35, 0.18); color: #ffea3b; border: 1px solid rgba(252, 232, 35, 0.45); }
        .tag-DF { background: rgba(45, 219, 75, 0.18); color: #4ee86e; border: 1px solid rgba(45, 219, 75, 0.45); }
        .tag-GK { background: rgba(42, 111, 214, 0.2); color: #619dff; border: 1px solid rgba(42, 111, 214, 0.45); }
        
        /* Rarity Badges */
        .tag-Legendary { background: rgba(255, 255, 255, 0.06); color: #a6adb5; border: 1px solid rgba(255, 255, 255, 0.15); }
        .tag-Special { background: rgba(212, 175, 55, 0.15); color: #f0ce54; border: 1px solid rgba(212, 175, 55, 0.4); }
        
        /* Special Edition Badges */
        [class*="tag-Champion"] { background: rgba(13, 58, 153, 0.25); color: #78a2ff; border: 1px solid rgba(13, 58, 153, 0.5); }
        [class*="tag-Classic"] { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.25); }
        [class*="tag-Dream-Star"] { background: rgba(147, 34, 201, 0.22); color: #e084ff; border: 1px solid rgba(147, 34, 201, 0.5); }
        [class*="tag-Kick-Off"] { background: rgba(201, 22, 82, 0.22); color: #ff75a4; border: 1px solid rgba(201, 22, 82, 0.5); }
        [class*="tag-Toty"] { background: rgba(0, 143, 68, 0.22); color: #45f09b; border: 1px solid rgba(0, 143, 68, 0.5); }
        
        /* === FULLSCREEN LIGHTBOX MODAL === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            position: relative;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.85);
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-image {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .modal-caption {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .modal-close {
            position: absolute;
            top: -45px;
            right: 0;
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #ffd700; }

    </style>
</head>
<body>

    <h1>⚽ My DLS Card Collection</h1>
    
    <!-- Controls & Search -->
    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 Search player...">
        <select id="sortSelect">
            <option value="ratingDesc">Sort by Rating (High to Low)</option>
            <option value="ratingAsc">Sort by Rating (Low to High)</option>
            <option value="nameAsc">Sort by Name (A-Z)</option>
        </select>
        <select id="filterSelect">
            <option value="All">All Cards</option>
            <option value="Legendary">Legendary</option>
            <option value="Special">Special</option>
            <option value="FW">Forwards (FW)</option>
            <option value="MF">Midfielders (MF)</option>
            <option value="DF">Defenders (DF)</option>
            <option value="GK">Goalkeepers (GK)</option>
            <option value="Champion">Champion</option>
            <option value="Classic">Classic</option>
            <option value="Dream Star">Dream Star</option>
            <option value="Kick-Off Star">Kick-Off Star</option>
        </select>
    </div>

    <!-- Live Counter -->
    <div class="stats-counter" id="statsCounter">Loading stats...</div>

    <!-- Gallery -->
    <div class="gallery" id="gallery"></div>

    <!-- Lightbox Zoom Modal -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
        :root {
        --bg: #08080c;
        --panel: rgba(255, 255, 255, 0.055);
        --panel-solid: #141419;
        --border: rgba(255, 255, 255, 0.11);
        --text: #ffffff;
        --muted: #9ca3af;
        --gold: #ffd700;
        }
    
        *{*
            box-sizing: border-box;
        }
    
        html {
            background: var(--bg);
        }
    
        body {
            background:
                radial-gradient(circle at 18% 0%, rgba(255, 215, 0, 0.13), transparent 30%),
                radial-gradient(circle at 82% 5%, rgba(80, 120, 255, 0.16), transparent 32%),
                radial-gradient(circle at 50% 100%, rgba(180, 60, 255, 0.09), transparent 38%),
                linear-gradient(180deg, #101018 0%, #08080c 58%, #070709 100%);
            background-color: var(--bg);
            min-height: 100vh;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 32px 18px 50px;
            overflow-x: hidden;
        }
    
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 75%);
            z-index: -1;
        }
    
        h1 {
            max-width: 1200px;
            margin: 0 auto 22px;
            padding: 36px 20px;
            text-align: center;
            font-size: clamp(34px, 6vw, 62px);
            line-height: 0.98;
            font-weight: 950;
            letter-spacing: -1.8px;
            color: #ffffff;
            text-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border-radius: 24px;
            background:
                linear-gradient(135deg, rgba(255, 215, 0, 0.14), transparent 35%),
                linear-gradient(225deg, rgba(80, 120, 255, 0.16), transparent 42%),
                rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 18px 55px rgba(0,0,0,0.4);
        }
    
        .controls {
            max-width: 1200px;
            margin: 0 auto 15px auto;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 35px rgba(0,0,0,0.28);
        }
    
        select,
        input[type="text"] {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.13);
            padding: 11px 16px;
            border-radius: 11px;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }
    
        select {
            cursor: pointer;
        }
    
        input[type="text"] {
            width: min(330px, 100%);
        }
    
        input[type="text"]::placeholder {
            color: #858b96;
        }
    
        select:hover,
        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.34);
            background: rgba(255, 255, 255, 0.095);
        }
    
        select option {
            background: #18181d;
            color: #fff;
        }
    
        .stats-counter {
            text-align: center;
            font-size: 13px;
            color: #a0a5ab;
            margin-bottom: 28px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
    
        .stats-counter span {
            color: var(--gold);
            font-weight: 950;
        }
    
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(245px, 280px));
            justify-content: center;
            gap: 22px;
            max-width: 1200px;
            margin: 0 auto;
        }
    
        .card-container {
            position: relative;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.065), rgba(255,255,255,0.022)),
                linear-gradient(145deg, #18181d, #101014);
            border: 1px solid rgba(255, 255, 255, 0.075);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
        }
    
        .card-container::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 45%);
        }
    
        .card-container:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.17);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.62);
        }
    
        .card-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 14px;
            margin-bottom: 13px;
            padding: 10px;
            transform-style: preserve-3d;
            will-change: transform;
            cursor: zoom-in;
            z-index: 1;
            background:
                radial-gradient(circle at 50% 12%, rgba(255,255,255,0.15), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.07);
        }
    
        .holo-glare {
            position: absolute;
            inset: 10px;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 5;
            mix-blend-mode: screen;
        }
    
        .card-image {
            width: 100%;
            border-radius: 10px;
            display: block;
            pointer-events: none;
            position: relative;
            z-index: 1;
            background: #111;
            box-shadow: 0 9px 20px rgba(0,0,0,0.42);
        }
    
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-top: 2px;
            margin-bottom: 12px;
            padding: 0 4px;
            position: relative;
            z-index: 1;
        }
    
        .card-title {
            font-size: 15px;
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: 0.35px;
            color: #ffffff;
            margin: 0;
            word-break: break-word;
        }
    
        .card-rating {
            white-space: nowrap;
            flex-shrink: 0;
            background: rgba(255, 215, 0, 0.13);
            color: var(--gold);
            border: 1px solid rgba(255, 215, 0, 0.36);
            font-weight: 950;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            letter-spacing: 0.4px;
        }
    
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 4px 2px;
            position: relative;
            z-index: 1;
        }
    
        .tag {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10.5px;
            font-weight: 850;
            letter-spacing: 0.55px;
            text-transform: uppercase;
        }
    
        .tag-FW {
            background: rgba(209, 40, 40, 0.2);
            color: #ff5e5e;
            border: 1px solid rgba(209, 40, 40, 0.45);
        }
    
        .tag-MF {
            background: rgba(252, 232, 35, 0.18);
            color: #ffea3b;
            border: 1px solid rgba(252, 232, 35, 0.45);
        }
    
        .tag-DF {
            background: rgba(45, 219, 75, 0.18);
            color: #4ee86e;
            border: 1px solid rgba(45, 219, 75, 0.45);
        }
    
        .tag-GK {
            background: rgba(42, 111, 214, 0.2);
            color: #619dff;
            border: 1px solid rgba(42, 111, 214, 0.45);
        }
    
        .tag-Legendary {
            background: rgba(255, 255, 255, 0.06);
            color: #b6bdc8;
            border: 1px solid rgba(255, 255, 255, 0.16);
        }
    
        .tag-Special {
            background: rgba(212, 175, 55, 0.15);
            color: #f0ce54;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
    
        [class*="tag-Champion"] {*
            background: rgba(13, 58, 153, 0.25);
            color: #78a2ff;
            border: 1px solid rgba(13, 58, 153, 0.5);
        }
    
        [class*="tag-Classic"] {*
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
    
        [class*="tag-Dream-Star"] {*
            background: rgba(147, 34, 201, 0.22);
            color: #e084ff;
            border: 1px solid rgba(147, 34, 201, 0.5);
        }
    
        [class*="tag-Kick-Off"] {*
            background: rgba(201, 22, 82, 0.22);
            color: #ff75a4;
            border: 1px solid rgba(201, 22, 82, 0.5);
        }
    
        [class*="tag-Toty"] {*
            background: rgba(0, 143, 68, 0.22);
            color: #45f09b;
            border: 1px solid rgba(0, 143, 68, 0.5);
        }
    
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.86);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }
    
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    
        .modal-content {
            position: relative;
            max-width: 410px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.88) translateY(8px);
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }
    
        .modal-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: #111;
        }
    
        .modal-caption {
            margin-top: 15px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 16px;
            font-weight: 950;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.4px;
        }
    
        .modal-close {
            position: absolute;
            top: -48px;
            right: 0;
            color: #ffffff;
            font-size: 34px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            user-select: none;
        }
    
        .modal-close:hover {
            color: var(--gold);
            transform: scale(1.08);
        }
    
        @media (max-width: 760px) {
            body {
                padding: 22px 13px 40px;
            }
    
            h1 {
                padding: 30px 16px;
                letter-spacing: -1.2px;
            }
    
            .controls {
                justify-content: stretch;
            }
    
            select,
            input[type="text"] {
                width: 100%;
            }
    
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                gap: 16px;
            }
        }
    </script>
</body>
</html>
