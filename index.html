<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DLS Card Collection</title>
    <!-- Imported Gaming Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,800;0,900&display=swap" rel="stylesheet">
    <style>
        /* === ATMOSPHERIC BASE STYLING === */
        body { 
            background-color: #0c0c0e;
            /* High-tech grid and spotlight background */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(30, 30, 45, 0.9) 0%, transparent 70%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center top, center center, center center;
            min-height: 100vh;
            color: #e0e0e0; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffffff, #a0a5ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }
        
        /* === FROSTED GLASS CONTROLS & SEARCH === */
        .controls { 
            max-width: 1200px; 
            margin: 0 auto 15px auto; 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        select, input[type="text"] { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; 
            font-weight: 600;
            outline: none; 
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        select { cursor: pointer; }
        input[type="text"] { width: 200px; }
        input[type="text"]::placeholder { color: #888; font-weight: 400; }
        select:hover, input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.09);
        }
        select option {
            background: #18181d;
            color: #fff;
        }

        /* === LIVE STATS COUNTER === */
        .stats-counter {
            text-align: center;
            font-size: 13px;
            color: #a0a5ab;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .stats-counter span {
            color: #ffd700;
            font-weight: 800;
        }

        /* === RESPONSIVE GRID === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* === GROUNDED SHOWCASE CONTAINER (UPDATED) === */
        .card-container { 
            position: relative;
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; 
            padding: 0; /* Flush with image */
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            overflow: hidden; /* Clips the bottom slider info neatly */
            cursor: zoom-in;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .card-container:hover {
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* 🪄 WRAPPER FOR IMAGE 🪄 */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            z-index: 1;
        }

        /* Holographic Light Shine Layer */
        .holo-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 5;
            mix-blend-mode: screen;
        }

        .card-image { 
            width: 100%; 
            display: block;
            pointer-events: none;
            position: relative;
            z-index: 1;
        }

        /* === SLIDING INFO PEDESTAL (NEW) === */
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px;
            transform: translateY(100%); /* Hidden by default */
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
        }
        
        /* Slides up on hover */
        .card-container:hover .card-info {
            transform: translateY(0); 
        }
        
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            gap: 10px;
            margin-bottom: 12px; 
        }
        .card-title { 
            font-size: 15px; 
            font-weight: 800; 
            line-height: 1.3;
            letter-spacing: 0.5px;
            color: #ffffff; 
            margin: 0; 
            word-break: break-word;
        }
        .card-rating { 
            white-space: nowrap; 
            flex-shrink: 0; 
            background: rgba(255, 215, 0, 0.12); 
            color: #ffd700; 
            border: 1px solid rgba(255, 215, 0, 0.35);
            font-weight: 800; 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 12px; 
            letter-spacing: 0.5px;
        }
        
        /* === TRANSLUCENT ESPORTS BADGES === */
        .tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
        }
        .tag { 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        /* Position Badges */
        .tag-FW { background: rgba(209, 40, 40, 0.2); color: #ff5e5e; border: 1px solid rgba(209, 40, 40, 0.45); }
        .tag-MF { background: rgba(252, 232, 35, 0.18); color: #ffea3b; border: 1px solid rgba(252, 232, 35, 0.45); }
        .tag-DF { background: rgba(45, 219, 75, 0.18); color: #4ee86e; border: 1px solid rgba(45, 219, 75, 0.45); }
        .tag-GK { background: rgba(42, 111, 214, 0.2); color: #619dff; border: 1px solid rgba(42, 111, 214, 0.45); }
        
        /* Rarity Badges */
        .tag-Legendary { background: rgba(255, 255, 255, 0.06); color: #a6adb5; border: 1px solid rgba(255, 255, 255, 0.15); }
        .tag-Special { background: rgba(212, 175, 55, 0.15); color: #f0ce54; border: 1px solid rgba(212, 175, 55, 0.4); }
        
        /* Special Edition Badges */
        [class*="tag-Champion"] { background: rgba(13, 58, 153, 0.25); color: #78a2ff; border: 1px solid rgba(13, 58, 153, 0.5); }
        [class*="tag-Classic"] { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.25); }
        [class*="tag-Dream-Star"] { background: rgba(147, 34, 201, 0.22); color: #e084ff; border: 1px solid rgba(147, 34, 201, 0.5); }
        [class*="tag-Kick-Off"] { background: rgba(201, 22, 82, 0.22); color: #ff75a4; border: 1px solid rgba(201, 22, 82, 0.5); }
        [class*="tag-Toty"] { background: rgba(0, 143, 68, 0.22); color: #45f09b; border: 1px solid rgba(0, 143, 68, 0.5); }
        
        /* === FULLSCREEN LIGHTBOX MODAL === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            position: relative;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.85);
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-image {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .modal-caption {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .modal-close {
            position: absolute;
            top: -45px;
            right: 0;
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #ffd700; }

    </style>
</head>
<body>

    <h1>⚽ My DLS Card Collection</h1>
    
    <!-- Controls & Search -->
    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 Search player...">
        <select id="sortSelect">
            <option value="ratingDesc">Sort by Rating (High to Low)</option>
            <option value="ratingAsc">Sort by Rating (Low to High)</option>
            <option value="nameAsc">Sort by Name (A-Z)</option>
        </select>
        <select id="filterSelect">
            <option value="All">All Cards</option>
            <option value="Legendary">Legendary</option>
            <option value="Special">Special</option>
            <option value="FW">Forwards (FW)</option>
            <option value="MF">Midfielders (MF)</option>
            <option value="DF">Defenders (DF)</option>
            <option value="GK">Goalkeepers (GK)</option>
            <option value="Champion">Champion</option>
            <option value="Classic">Classic</option>
            <option value="Dream Star">Dream Star</option>
            <option value="Kick-Off Star">Kick-Off Star</option>
        </select>
    </div>

    <!-- Live Counter -->
    <div class="stats-counter" id="statsCounter">Loading stats...</div>

    <!-- Gallery -->
    <div class="gallery" id="gallery"></div>

    <!-- Lightbox Zoom Modal -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv"; 
        
        let myCards = []; 
        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const filterSelect = document.getElementById('filterSelect');
        const statsCounter = document.getElementById('statsCounter');

        // Modal elements
        const cardModal = document.getElementById('cardModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');

        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                
                const rows = csvText.split(/\r?\n/).slice(1); 
                
                myCards = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(','); 
                    
                    const name = cols[0] ? cols[0].trim() : "Unknown";
                    const rating = cols[1] ? parseInt(cols[1].trim()) : 0;
                    
                    const tags = [cols[2], cols[3], cols[4]]
                        .map(tag => tag ? tag.trim() : '')
                        .filter(tag => tag !== '');
                        
                    const image = cols[5] ? cols[5].trim() : '';

                    return { name, rating, tags, image };
                });
                
                updateGallery(); 
            } catch (error) {
                console.error("Error loading data:", error);
                gallery.innerHTML = "<p style='color:white; text-align:center;'>Failed to load players.</p>";
            }
        }

        function renderCards(cardsArray) {
            gallery.innerHTML = ''; 
            
            if (cardsArray.length === 0) {
                gallery.innerHTML = "<p style='color:#888; text-align:center; width:100%; grid-column: 1/-1;'>No players found matching your search.</p>";
                return;
            }

            cardsArray.forEach(card => {
                let tagsHTML = '';
                card.tags.forEach(tag => {
                    const tagClass = tag.replace(/\s+/g, '-');
                    tagsHTML += `<span class="tag tag-${tagClass}">${tag}</span>`;
                });

                const cardElement = document.createElement('div');
                cardElement.className = 'card-container'; 
                
                cardElement.innerHTML = `
                    <div class="card-image-wrapper">
                        <div class="holo-glare"></div>
                        <img src="images/${card.image}.webp" alt="${card.name}" class="card-image" onerror="this.src='https://via.placeholder.com/300x400/191919/ffffff?text=Image+Missing'">
                    </div>
                    <div class="card-info">
                        <div class="card-header">
                            <div class="card-title">${card.name}</div>
                            <div class="card-rating">★ ${card.rating}</div>
                        </div>
                        <div class="tags">${tagsHTML}</div>
                    </div>
                `;

                const holoGlare = cardElement.querySelector('.holo-glare');

                // CLICK TO ZOOM (Works on both Mobile and Desktop)
                cardElement.addEventListener('click', () => {
                    modalImage.src = `images/${card.image}.webp`;
                    modalCaption.innerHTML = `${card.name} <span style="color:#ffd700; margin-left:8px;">★ ${card.rating}</span>`;
                    cardModal.classList.add('active');
                });

                // 🪄 DESKTOP ONLY: Dramatic Pop-Out 3D Tilt applied to ENTIRE card 🪄
                if (isDesktop) {
                    cardElement.addEventListener('mouseenter', () => {
                        cardElement.style.transition = 'transform 0.08s ease-out, box-shadow 0.08s ease-out';
                        cardElement.style.zIndex = '10'; // Brings card above neighbors while popping
                        if (holoGlare) holoGlare.style.opacity = '1';
                    });

                    cardElement.addEventListener('mousemove', (e) => {
                        const rect = cardElement.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -10;
                        const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 10;
                        
                        cardElement.style.transform = `perspective(1000px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(1.05) translateY(-8px)`;
                        cardElement.style.boxShadow = '0 30px 50px rgba(0, 0, 0, 0.9)';

                        if (holoGlare) {
                            const percentX = (x / rect.width) * 100;
                            const percentY = (y / rect.height) * 100;
                            holoGlare.style.background = `radial-gradient(circle at ${percentX}% ${percentY}%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 215, 0, 0.15) 30%, transparent 70%)`;
                        }
                    });

                    cardElement.addEventListener('mouseleave', () => {
                        cardElement.style.transition = 'all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                        cardElement.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1) translateY(0px)';
                        cardElement.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.6)';
                        cardElement.style.zIndex = '1';
                        if (holoGlare) holoGlare.style.opacity = '0';
                    });
                }

                gallery.appendChild(cardElement);
            });
        }

        // Close Modal Handlers
        cardModal.addEventListener('click', (e) => {
            if (e.target === cardModal || e.target.classList.contains('modal-close')) {
                cardModal.classList.remove('active');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cardModal.classList.remove('active');
        });

        function updateGallery() {
            let filteredCards = [...myCards];
            
            const searchQuery = searchInput.value.toLowerCase().trim();
            if (searchQuery !== "") {
                filteredCards = filteredCards.filter(card => card.name.toLowerCase().includes(searchQuery));
            }

            const filterValue = filterSelect.value;
            if (filterValue !== "All") {
                filteredCards = filteredCards.filter(card => card.tags.includes(filterValue));
            }
            
            const sortValue = sortSelect.value;
            if (sortValue === "ratingDesc") {
                filteredCards.sort((a, b) => b.rating - a.rating);
            } else if (sortValue === "ratingAsc") {
                filteredCards.sort((a, b) => a.rating - b.rating);
            } else if (sortValue === "nameAsc") {
                filteredCards.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            const count = filteredCards.length;
            if (count > 0) {
                const totalRating = filteredCards.reduce((sum, card) => sum + card.rating, 0);
                const avg = (totalRating / count).toFixed(1);
                statsCounter.innerHTML = `Showing <span>${count}</span> Card${count !== 1 ? 's' : ''} | Avg Rating: <span>★ ${avg}</span>`;
            } else {
                statsCounter.innerHTML = `Showing <span>0</span> Cards`;
            }

            renderCards(filteredCards);
        }

        searchInput.addEventListener('input', updateGallery);
        sortSelect.addEventListener('change', updateGallery);
        filterSelect.addEventListener('change', updateGallery);

        loadData();
    </script>
</body>
</html>
