<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Card Collection | Arnob Scarneel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* === BASE STYLING === */
        html {
            background-color: #07070a; 
            overscroll-behavior-y: none; 
        }
        body { 
            background-color: transparent;
            min-height: 100vh;
            color: #e0e0e0; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0; 
            overscroll-behavior-y: none;
        }

        /* === AMBIENT GLOW === */
        .ambient-bg {
            position: fixed;
            top: -25vh; left: -25vw; right: -25vw; bottom: -25vh;
            background-image: 
                radial-gradient(circle at 25vw 25vh, rgba(30, 70, 150, 0.35) 0%, transparent 50vw),
                radial-gradient(circle at 125vw 125vh, rgba(150, 30, 90, 0.35) 0%, transparent 50vw);
            z-index: -1;
            pointer-events: none;
        }

        /* === HERO BANNER === */
        .hero-banner {
            position: relative;
            background: linear-gradient(to bottom, rgba(10, 10, 12, 0.5) 0%, #07070a 90%, #07070a 100%), 
                        url('https://images.pexels.com/photos/1884574/pexels-photo-1884574.jpeg?auto=compress&cs=tinysrgb&w=2000') center/cover;
            padding: 70px 20px 40px;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            pointer-events: none;
        }
        .hero-banner h1 { 
            position: relative;
            z-index: 2;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            font-size: clamp(2rem, 5vw + 1rem, 3.5rem); 
            margin: 0; 
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff; 
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            line-height: 1.15;
            max-width: 90%;
        }

        .hero-banner .subtitle {
            position: relative;
            z-index: 2;
            font-family: 'Rajdhani', sans-serif;
            color: #eab308;
            letter-spacing: 4px;
            font-weight: 700;
            font-size: clamp(0.9rem, 2vw + 0.5rem, 1.1rem);
            text-transform: uppercase;
            margin-top: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* === MAIN CONTENT === */
        .content-wrapper {
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* === 3-PART CONTROL BAR === */
        .controls { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        select, input[type="text"] { 
            flex: 1;
            min-width: 200px;
            max-width: 280px; 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
            outline: none; 
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            box-sizing: border-box;
        }
        select { cursor: pointer; }
        input[type="text"]::placeholder { color: #888; }
        select:hover, input[type="text"]:focus {
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        select option { background: #18181d; color: #fff; }

        /* === PILL FILTERS === */
        .filter-section {
            margin-bottom: 25px;
            max-width: 100%;
            text-align: center; 
        }
        .filter-label {
            font-family: 'Rajdhani', sans-serif;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-group {
            display: flex;
            gap: 12px;
            justify-content: center; 
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        .filter-group::-webkit-scrollbar { display: none; }
        
        .filter-pill {
            flex-shrink: 0; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0a5ab;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .filter-pill:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .filter-pill.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        /* === STATS COUNTER === */
        .stats-counter {
            text-align: center;
            font-size: 16px;
            font-family: 'Rajdhani', sans-serif;
            color: #a0a5ab;
            margin: 10px 0 35px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .stats-counter span { color: #ffd700; font-weight: 800; font-size: 18px; }

        /* === GALLERY & CARDS === */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 35px 25px; 
        }
        .card-container { position: relative; display: flex; flex-direction: column; }
        .card-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px; 
            margin-bottom: 12px;
            transform-style: preserve-3d;
            will-change: transform, box-shadow;
            cursor: zoom-in;
            z-index: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: box-shadow 0.3s ease; 
        }
        
        /* ✨ THINNER, SHARPER FOIL SHEEN ✨ */
        .holo-glare {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 12px; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; z-index: 5; 
            mix-blend-mode: color-dodge; 
            
            --angle: 115deg; 
            /* Notice how much closer the percentages are (40% to 60%) to create a thin, sharp beam */
            background: linear-gradient(
                var(--angle),
                transparent 40%,
                rgba(255, 255, 255, 0.15) 45%,
                rgba(255, 215, 0, 0.35) 48%,
                rgba(255, 255, 255, 0.6) 50%, /* Core bright white sheen */
                rgba(0, 212, 255, 0.3) 52%,
                rgba(255, 105, 180, 0.2) 55%,
                rgba(255, 255, 255, 0.1) 58%,
                transparent 60%
            );
            background-size: 200% 200%;
            background-position: 50% 50%;
        }
        
        .card-image { 
            width: 100%; 
            aspect-ratio: 695 / 425; 
            object-fit: contain; 
            border-radius: 12px; 
            display: block; 
            pointer-events: none; 
            position: relative; 
            z-index: 1; 
        }
        
        .card-details { width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; padding: 0 4px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .card-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.1; letter-spacing: 0.5px; color: #ffffff; margin: 0; }
        .card-rating { font-family: 'Rajdhani', sans-serif; white-space: nowrap; background: rgba(255, 215, 0, 0.12); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.35); font-weight: 700; padding: 3px 8px; border-radius: 6px; font-size: 14px; }
        
        .tags { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 6px; }
        .tag { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
        
        .tag-FW { background: rgba(209, 40, 40, 0.2); color: #ff5e5e; border: 1px solid rgba(209, 40, 40, 0.45); }
        .tag-MF { background: rgba(252, 232, 35, 0.18); color: #ffea3b; border: 1px solid rgba(252, 232, 35, 0.45); }
        .tag-DF { background: rgba(45, 219, 75, 0.18); color: #4ee86e; border: 1px solid rgba(45, 219, 75, 0.45); }
        .tag-GK { background: rgba(42, 111, 214, 0.2); color: #619dff; border: 1px solid rgba(42, 111, 214, 0.45); }
        
        .tag-Legendary { background: rgba(255, 255, 255, 0.06); color: #d1d6dc; border: 1px solid rgba(255, 255, 255, 0.15); }
        .tag-Special { background: rgba(212, 175, 55, 0.15); color: #f0ce54; border: 1px solid rgba(212, 175, 55, 0.4); }
        
        [class*="tag-Champion"] { background: rgba(13, 58, 153, 0.25); color: #78a2ff; border: 1px solid rgba(13, 58, 153, 0.5); }
        [class*="tag-Classic"] { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.25); }
        [class*="tag-Dream-Star"] { background: rgba(147, 34, 201, 0.22); color: #e084ff; border: 1px solid rgba(147, 34, 201, 0.5); }
        [class*="tag-Kick-Off"] { background: rgba(201, 22, 82, 0.22); color: #ff75a4; border: 1px solid rgba(201, 22, 82, 0.5); }
        [class*="tag-Toty"] { background: rgba(0, 143, 68, 0.22); color: #45f09b; border: 1px solid rgba(0, 143, 68, 0.5); }
        
        /* === MODAL === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 7, 0.9); backdrop-filter: blur(15px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { position: relative; max-width: 420px; width: 100%; display: flex; flex-direction: column; align-items: center; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-content { transform: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) scale(1); }
        .modal-image { width: 100%; border-radius: 16px; box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal-caption { margin-top: 20px; font-size: 28px; font-family: 'Rajdhani', sans-serif; font-weight: 800; color: #ffffff; text-align: center; letter-spacing: 1px; }
        .modal-close { position: absolute; top: -50px; right: 0; color: #ffffff; font-size: 36px; font-weight: 300; cursor: pointer; transition: color 0.2s, transform 0.2s; }
        .modal-close:hover { color: #ffd700; transform: scale(1.1); }

        /* === MOBILE RESPONSIVENESS === */
        @media (max-width: 768px) {
            .hero-banner { padding: 40px 15px 30px; }
            .controls { flex-direction: column; align-items: stretch; }
            select, input[type="text"] { max-width: 100%; }
            .filter-section { text-align: left; }
            .filter-group { justify-content: flex-start; padding-left: 5px; }
            .filter-label { padding-left: 10px; }
            
            .stats-counter {
                font-size: 13px;
                letter-spacing: 0.5px;
            }
            .stats-counter span { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <header class="hero-banner">
        <h1>⚽ DLS CARD COLLECTION</h1>
        <div class="subtitle">BY ARNOB SCARNEEL</div>
    </header>
    
    <div class="content-wrapper">
        
        <!-- === TOP CONTROLS === -->
        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Search player or rating...">
            
            <select id="promoSelect">
                <option value="All">🏆 All Promos</option>
                <option value="Classic">Classic</option>
                <option value="Champion">Champion</option>
                <option value="Dream Star">Dream Star</option>
                <option value="Toty">TOTY</option>
                <option value="Kick-Off">Kick-Off</option>
            </select>

            <select id="sortSelect">
                <option value="ratingDesc">Sort: Rating (High to Low)</option>
                <option value="ratingAsc">Sort: Rating (Low to High)</option>
                <option value="nameAsc">Sort: Name (A-Z)</option>
                <option value="nameDesc">Sort: Name (Z-A)</option>
            </select>
        </div>

        <!-- === ROW 1: CARD TYPE === -->
        <div class="filter-section">
            <div class="filter-label">Card Type</div>
            <div class="filter-group" id="typeFilters">
                <div class="filter-pill active" data-filter="All">ALL</div>
                <div class="filter-pill" data-filter="Legendary">STANDARD</div>
                <div class="filter-pill" data-filter="Special">SPECIAL</div>
            </div>
        </div>

        <!-- === ROW 2: POSITION === -->
        <div class="filter-section">
            <div class="filter-label">Position</div>
            <div class="filter-group" id="positionFilters">
                <div class="filter-pill active" data-filter="All">ALL</div>
                <div class="filter-pill" data-filter="FW">FW</div>
                <div class="filter-pill" data-filter="MF">MF</div>
                <div class="filter-pill" data-filter="DF">DF</div>
                <div class="filter-pill" data-filter="GK">GK</div>
            </div>
        </div>

        <div class="stats-counter" id="statsCounter">Loading database...</div>
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzy7w0GcQzjNqNFsRennLi5WorAoS6XHZPiRJF4n-3amHhA7A9czTggF9gc7TUGXIsxdPFICRikf7s/pub?gid=266421028&single=true&output=csv"; 
        
        let myCards = []; 
        let currentTypeFilter = "All"; 
        let currentPosFilter = "All"; 

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const promoSelect = document.getElementById('promoSelect');
        const sortSelect = document.getElementById('sortSelect');
        const statsCounter = document.getElementById('statsCounter');

        const cardModal = document.getElementById('cardModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');
        const typePills = document.querySelectorAll('#typeFilters .filter-pill');
        const posPills = document.querySelectorAll('#positionFilters .filter-pill');

        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).slice(1); 
                
                myCards = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(','); 
                    const name = cols[0] ? cols[0].trim() : "Unknown";
                    const rating = cols[1] ? parseInt(cols[1].trim()) : 0;
                    const tags = [cols[2], cols[3], cols[4]].map(tag => tag ? tag.trim() : '').filter(tag => tag !== '');
                    const image = cols[5] ? cols[5].trim() : '';
                    return { name, rating, tags, image };
                });
                
                updateGallery(); 
            } catch (error) {
                console.error("Error loading data:", error);
                gallery.innerHTML = "<p style='color:white; text-align:center; grid-column:1/-1; font-family:Rajdhani;'>Failed to load players.</p>";
            }
        }

        function renderCards(cardsArray) {
            gallery.innerHTML = ''; 
            
            if (cardsArray.length === 0) {
                gallery.innerHTML = "<p style='color:#888; text-align:center; width:100%; grid-column: 1/-1;'>No players found matching your criteria.</p>";
                return;
            }

            cardsArray.forEach(card => {
                let tagsHTML = '';
                card.tags.forEach(tag => {
                    const tagClass = tag.replace(/\s+/g, '-');
                    tagsHTML += `<span class="tag tag-${tagClass}">${tag}</span>`;
                });

                const hasTag = (tagStr) => card.tags.some(t => t.toLowerCase().includes(tagStr.toLowerCase()));

                let hoverGlow = "rgba(255, 255, 255, 0.25)"; 
                if (hasTag('Classic')) hoverGlow = "rgba(255, 215, 0, 0.6)"; 
                else if (hasTag('Champion')) hoverGlow = "rgba(13, 58, 153, 0.7)"; 
                else if (hasTag('Dream Star')) hoverGlow = "rgba(147, 34, 201, 0.7)"; 
                else if (hasTag('Toty')) hoverGlow = "rgba(0, 255, 120, 0.5)"; 
                else if (hasTag('Kick-Off')) hoverGlow = "rgba(255, 117, 164, 0.6)"; 

                const cardElement = document.createElement('div');
                cardElement.className = 'card-container'; 
                
                cardElement.innerHTML = `
                    <div class="card-image-wrapper">
                        <div class="holo-glare"></div>
                        <img src="images/${card.image}.webp" alt="${card.name}" class="card-image" onerror="this.src='https://via.placeholder.com/300x400/191919/ffffff?text=Image+Missing'">
                    </div>
                    <div class="card-details">
                        <div class="card-header">
                            <div class="card-title">${card.name}</div>
                            <div class="card-rating">★ ${card.rating}</div>
                        </div>
                        <div class="tags">${tagsHTML}</div>
                    </div>
                `;

                const imageWrapper = cardElement.querySelector('.card-image-wrapper');
                const holoGlare = imageWrapper.querySelector('.holo-glare');

                imageWrapper.addEventListener('click', () => {
                    modalImage.src = `images/${card.image}.webp`;
                    modalCaption.innerHTML = `${card.name} <span style="color:#ffd700; margin-left:8px;">★ ${card.rating}</span>`;
                    cardModal.classList.add('active');
                });

                if (isDesktop) {
                    imageWrapper.addEventListener('mouseenter', () => {
                        imageWrapper.style.transition = 'transform 0.08s ease-out';
                        imageWrapper.style.zIndex = '10'; 
                        if (holoGlare) holoGlare.style.opacity = '1';
                    });

                    imageWrapper.addEventListener('mousemove', (e) => {
                        const rect = imageWrapper.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -16;
                        const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 16;
                        
                        imageWrapper.style.transform = `perspective(800px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(1.08) translateY(-4px)`;
                        imageWrapper.style.boxShadow = `0 25px 50px ${hoverGlow}`;

                        if (holoGlare) {
                            const normalizedX = (x / rect.width) * 2 - 1; 
                            const normalizedY = (y / rect.height) * 2 - 1; 
                            
                            const angle = 115 + (normalizedX * 20) + (normalizedY * 20);
                            holoGlare.style.setProperty('--angle', `${angle}deg`);
                            
                            // ✨ FIXED: Multiplier set to 50 so it slides completely off the edges ✨
                            const bgX = 50 - (normalizedX * 50);
                            const bgY = 50 - (normalizedY * 50);
                            holoGlare.style.backgroundPosition = `${bgX}% ${bgY}%`;
                        }
                    });

                    imageWrapper.addEventListener('mouseleave', () => {
                        imageWrapper.style.transition = 'all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1)';
                        imageWrapper.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1) translateY(0px)';
                        
                        imageWrapper.style.boxShadow = `0 10px 20px rgba(0,0,0,0.6)`;
                        imageWrapper.style.zIndex = '1';
                        
                        if (holoGlare) {
                            holoGlare.style.opacity = '0';
                            setTimeout(() => { 
                                holoGlare.style.backgroundPosition = '50% 50%'; 
                                holoGlare.style.setProperty('--angle', '115deg');
                            }, 300);
                        }
                    });
                }

                gallery.appendChild(cardElement);
            });
        }

        promoSelect.addEventListener('change', () => {
            if (promoSelect.value !== "All") {
                typePills.forEach(p => p.classList.remove('active'));
                document.querySelector('#typeFilters .filter-pill[data-filter="Special"]').classList.add('active');
                currentTypeFilter = "Special";
            }
            updateGallery();
        });

        typePills.forEach(pill => {
            pill.addEventListener('click', () => {
                typePills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentTypeFilter = pill.getAttribute('data-filter');

                if (currentTypeFilter === "Legendary" || currentTypeFilter === "All") {
                    promoSelect.value = "All";
                }
                updateGallery();
            });
        });

        posPills.forEach(pill => {
            pill.addEventListener('click', () => {
                posPills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentPosFilter = pill.getAttribute('data-filter');
                updateGallery();
            });
        });

        function updateGallery() {
            let filteredCards = [...myCards];
            
            const searchQuery = searchInput.value.toLowerCase().trim();
            if (searchQuery !== "") {
                filteredCards = filteredCards.filter(card => 
                    card.name.toLowerCase().includes(searchQuery) || 
                    card.rating.toString().includes(searchQuery)
                );
            }

            const currentPromoFilter = promoSelect.value;
            if (currentPromoFilter !== "All") {
                filteredCards = filteredCards.filter(card => 
                    card.tags.some(tag => tag.toLowerCase().includes(currentPromoFilter.toLowerCase()))
                );
            }

            if (currentTypeFilter !== "All") {
                filteredCards = filteredCards.filter(card => 
                    card.tags.some(tag => tag.toLowerCase().includes(currentTypeFilter.toLowerCase()))
                );
            }

            if (currentPosFilter !== "All") {
                filteredCards = filteredCards.filter(card => 
                    card.tags.some(tag => tag.toLowerCase() === currentPosFilter.toLowerCase())
                );
            }
            
            const sortValue = sortSelect.value;
            if (sortValue === "ratingDesc") {
                filteredCards.sort((a, b) => b.rating - a.rating);
            } else if (sortValue === "ratingAsc") {
                filteredCards.sort((a, b) => a.rating - b.rating);
            } else if (sortValue === "nameAsc") {
                filteredCards.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortValue === "nameDesc") { 
                filteredCards.sort((a, b) => b.name.localeCompare(a.name));
            }
            
            const count = filteredCards.length;
            if (count > 0) {
                const totalRating = filteredCards.reduce((sum, card) => sum + card.rating, 0);
                const avg = (totalRating / count).toFixed(1);
                statsCounter.innerHTML = `Showing <span>${count}</span> Card${count !== 1 ? 's' : ''} &nbsp;|&nbsp; Avg Rating: <span>★ ${avg}</span>`;
            } else {
                statsCounter.innerHTML = `Showing <span>0</span> Cards`;
            }

            renderCards(filteredCards);
        }

        searchInput.addEventListener('input', updateGallery);
        sortSelect.addEventListener('change', updateGallery);

        cardModal.addEventListener('click', (e) => {
            if (e.target === cardModal || e.target.classList.contains('modal-close')) {
                cardModal.classList.remove('active');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cardModal.classList.remove('active');
        });

        loadData();
    </script>
</body>
</html>
